/** Devuelve el emoji que representa un deporte. */
function iconoDeporte(deporte) {
  const map = { 'Pádel':'🎾', 'Fútbol':'⚽', 'Tenis':'🎾', 'Básquet':'🏀', 'Voley':'🏐', 'Natación':'🏊' };
  return map[deporte] || '🏟';
}

/**
 * Valida y crea una cancha nueva.
 * Lanza Error si los datos no son válidos.
 * Futuro: POST /api/canchas
 */
function crearCanchaAdmin(datos) {
  validarDatosCancha(datos);
  return DB.guardarCancha({
    id:            uid('c'),
    nombre:        datos.nombre.trim(),
    deporte:       datos.deporte.trim(),
    duracionTurno: Number(datos.duracion),
    precio:        Number(datos.precio),
    activa:        true,
    creadoEn:      new Date().toISOString(),
  });
}

/**
 * Valida y actualiza una cancha existente.
 * Futuro: PATCH /api/canchas/:id
 */
function editarCanchaAdmin(id, datos) {
  validarDatosCancha(datos);
  return DB.actualizarCancha(id, {
    nombre:        datos.nombre.trim(),
    deporte:       datos.deporte.trim(),
    duracionTurno: Number(datos.duracion),
    precio:        Number(datos.precio),
  });
}

/** Valida los campos comunes de un formulario de cancha. */
function validarDatosCancha(datos) {
  if (!datos.nombre?.trim() || datos.nombre.trim().length < 2)
    throw new Error('El nombre debe tener al menos 2 caracteres.');
  if (!datos.deporte?.trim() || datos.deporte.trim().length < 2)
    throw new Error('El deporte debe tener al menos 2 caracteres.');
  if (![60, 90].includes(Number(datos.duracion)))
    throw new Error('La duración debe ser 60 o 90 minutos.');
  if (!datos.precio || Number(datos.precio) <= 0)
    throw new Error('El precio debe ser mayor a cero.');
}

/**
 * Elimina una cancha si no tiene reservas activas asociadas.
 * Futuro: DELETE /api/canchas/:id
 */
function eliminarCanchaAdmin(canchaId) {
  const turnosActivos = DB.obtenerTodosTurnos().filter(
    t => t.canchaId === canchaId && ['reservado','pendiente','pagado'].includes(t.estado)
  );
  if (turnosActivos.length > 0)
    throw new Error(`Esta cancha tiene ${turnosActivos.length} turno(s) activo(s). Cancelalos antes de eliminar.`);
  DB.eliminarCancha(canchaId);
}

/**
 * Aplica la configuración guardada al CONFIG global y a la UI.
 * Se llama al inicializar y al guardar cambios.
 */
function aplicarConfig() {
  const cfg = DB.obtenerConfig();
  if (cfg.horaApertura) CONFIG.HORA_APERTURA = cfg.horaApertura;
  if (cfg.horaCierre)   CONFIG.HORA_CIERRE   = cfg.horaCierre;
  if (cfg.nombre) {
    document.querySelector('.header__title').textContent = cfg.nombre;
  }
}

/**
 * Renderiza el panel de administración completo:
 * lista de canchas + formulario de configuración.
 */
function renderAdmin() {
  renderCanchasAdmin();
  cargarFormConfig();
}

/** Renderiza las tarjetas de canchas en el panel admin. */
function renderCanchasAdmin() {
  const canchas = DB.obtenerCanchas();
  const grid    = document.getElementById('adminCourts');

  if (canchas.length === 0) {
    grid.innerHTML = `<div style="color:var(--text-muted);font-size:.88rem;padding:8px 0">
      No hay canchas registradas. Creá una con el botón +.</div>`;
    return;
  }

  grid.innerHTML = '';
  canchas.forEach(cancha => {
    const activa = cancha.activa !== false;
    const card   = document.createElement('div');
    card.className = 'admin-court' + (activa ? '' : ' inactiva');

    card.innerHTML = `
      <span class="admin-court__icon">${iconoDeporte(cancha.deporte)}</span>
      <div class="admin-court__name">${cancha.nombre}</div>
      <div class="admin-court__sport">${cancha.deporte}</div>
      <div class="admin-court__chips">
        <span class="cl-chip">${cancha.duracionTurno} min</span>
      </div>
      <div class="admin-court__price">$${cancha.precio.toLocaleString('es-AR')}</div>
      <div class="admin-court__foot">
        <button class="btn btn--ghost" style="font-size:.8rem;padding:6px 12px"
          data-accion="editar" data-id="${cancha.id}">Editar</button>
        <button class="btn btn--danger" style="font-size:.8rem;padding:6px 10px"
          data-accion="eliminar" data-id="${cancha.id}">✕</button>
        <label class="toggle-wrap" style="margin-left:auto" title="${activa ? 'Desactivar' : 'Activar'} cancha">
          <span>${activa ? 'Activa' : 'Inactiva'}</span>
          <label class="toggle">
            <input type="checkbox" ${activa ? 'checked' : ''}
              data-accion="toggle" data-id="${cancha.id}" />
            <span class="toggle__rail"></span>
          </label>
        </label>
      </div>`;
    grid.appendChild(card);
  });

  // Delegación de eventos en la grilla
  grid.onclick = e => {
    const btn = e.target.closest('[data-accion]');
    if (!btn) return;
    const { accion, id } = btn.dataset;
    if (accion === 'editar')   abrirFormCancha(id);
    if (accion === 'eliminar') acEliminarCancha(id);
  };
  grid.onchange = e => {
    const input = e.target.closest('[data-accion="toggle"]');
    if (input) acToggleCancha(input.dataset.id, input.checked);
  };
}

/**
 * Abre el modal con el formulario para crear o editar una cancha.
 * canchaId = null → nueva cancha.
 */
function abrirFormCancha(canchaId = null) {
  const cancha  = canchaId ? DB.obtenerCanchaPorId(canchaId) : null;
  const esNueva = !cancha;

  document.getElementById('mTitle').textContent = esNueva ? 'Nueva cancha' : 'Editar cancha';
  document.getElementById('mSub').textContent   = esNueva
    ? 'Completá los datos de la cancha.'
    : `Modificá los datos de ${cancha.nombre}.`;

  document.getElementById('mBody').innerHTML = `
    <div class="form-group">
      <label for="fCNombre">Nombre de la cancha</label>
      <input id="fCNombre" type="text" placeholder="Ej: Pádel 3"
             value="${cancha ? cancha.nombre : ''}" autocomplete="off" />
    </div>
    <div class="form-group">
      <label for="fCDeporte">Deporte</label>
      <input id="fCDeporte" type="text" placeholder="Ej: Pádel, Fútbol, Tenis…"
             value="${cancha ? cancha.deporte : ''}" autocomplete="off" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="fCDuracion">Duración del turno</label>
        <select id="fCDuracion" class="form-select">
          <option value="60" ${!cancha || cancha.duracionTurno === 60 ? 'selected' : ''}>60 minutos</option>
          <option value="90" ${cancha?.duracionTurno === 90 ? 'selected' : ''}>90 minutos</option>
        </select>
      </div>
      <div class="form-group">
        <label for="fCPrecio">Precio por turno ($)</label>
        <input id="fCPrecio" type="number" min="1" placeholder="Ej: 2500"
               value="${cancha ? cancha.precio : ''}" />
      </div>
    </div>`;

  const foot = document.getElementById('mFoot');
  foot.innerHTML = '';

  const btnGuardar = document.createElement('button');
  btnGuardar.className   = 'btn btn--success';
  btnGuardar.textContent = esNueva ? 'Crear cancha' : 'Guardar cambios';
  btnGuardar.addEventListener('click', () => {
    const datos = {
      nombre:   document.getElementById('fCNombre').value,
      deporte:  document.getElementById('fCDeporte').value,
      duracion: document.getElementById('fCDuracion').value,
      precio:   document.getElementById('fCPrecio').value,
    };
    try {
      if (esNueva) {
        crearCanchaAdmin(datos);
        cerrarModal(); renderCanchasAdmin();
        toast(`Cancha "${datos.nombre.trim()}" creada.`, 'success');
      } else {
        editarCanchaAdmin(canchaId, datos);
        cerrarModal(); renderCanchasAdmin();
        toast('Cancha actualizada.', 'success');
      }
    } catch (e) { toast(e.message, 'error'); }
  });
  foot.appendChild(btnGuardar);

  const btnCancelar = document.createElement('button');
  btnCancelar.className   = 'btn btn--ghost';
  btnCancelar.textContent = 'Cancelar';
  btnCancelar.addEventListener('click', cerrarModal);
  foot.appendChild(btnCancelar);

  document.getElementById('overlay').classList.add('active');
  setTimeout(() => document.getElementById('fCNombre')?.focus(), 50);
}

/** Activa o desactiva una cancha. */
function acToggleCancha(canchaId, activa) {
  DB.actualizarCancha(canchaId, { activa });
  renderCanchasAdmin();
  // Refrescar la grilla si está visible para reflejar el cambio
  if (document.body.getAttribute('data-view') === 'recepcion') renderGrilla();
  toast(`Cancha ${activa ? 'activada' : 'desactivada'}.`, 'info');
}

/** Elimina una cancha con confirmación. */
function acEliminarCancha(canchaId) {
  const cancha = DB.obtenerCanchaPorId(canchaId);
  if (!confirm(`¿Eliminar la cancha "${cancha.nombre}"? Esta acción no se puede deshacer.`)) return;
  try {
    eliminarCanchaAdmin(canchaId);
    renderCanchasAdmin();
    toast(`Cancha "${cancha.nombre}" eliminada.`, 'info');
  } catch (e) { toast(e.message, 'error'); }
}

/** Carga los valores actuales en el formulario de configuración. */
function cargarFormConfig() {
  const cfg = DB.obtenerConfig();
  document.getElementById('cfgNombre').value   = cfg.nombre       || 'Complejo Deportivo';
  document.getElementById('cfgApertura').value = cfg.horaApertura || CONFIG.HORA_APERTURA;
  document.getElementById('cfgCierre').value   = cfg.horaCierre   || CONFIG.HORA_CIERRE;
}

/** Guarda la configuración del complejo y la aplica al instante. */
function acGuardarConfig() {
  const nombre   = document.getElementById('cfgNombre').value.trim();
  const apertura = document.getElementById('cfgApertura').value;
  const cierre   = document.getElementById('cfgCierre').value;

  if (!nombre)   { toast('El nombre del complejo no puede estar vacío.', 'warning'); return; }
  if (!apertura || !cierre) { toast('Completá los horarios de apertura y cierre.', 'warning'); return; }
  if (apertura >= cierre)   { toast('La hora de apertura debe ser anterior al cierre.', 'error'); return; }

  DB.guardarConfig({ nombre, horaApertura: apertura, horaCierre: cierre });
  aplicarConfig();
  toast('Configuración guardada.', 'success');
}
