/**
 * Genera las iniciales del nombre para el avatar.
 * "Juan García" → "JG"
 */
function iniciales(nombre) {
  return nombre.trim().split(/\s+/).slice(0, 2).map(p => p[0].toUpperCase()).join('');
}

/** Paleta de colores para avatares de clientes */
const AVATAR_COLORS = ['#2f81f7','#3fb950','#a371f7','#d29922','#f85149','#39c5cf'];
function avatarColor(id) {
  // Extraer número del id para asignar color de forma determinista
  const n = parseInt(id.replace(/\D/g,'').slice(-4) || '0', 10);
  return AVATAR_COLORS[n % AVATAR_COLORS.length];
}
function avatarStyle(id) {
  const c = avatarColor(id);
  return `background:${c}22;border:1.5px solid ${c}44;color:${c}`;
}

/**
 * Renderiza las estadísticas globales del panel (totales de clientes,
 * reservas activas hoy, ingresos del mes).
 */
function renderStatsClientes() {
  const clientes = DB.obtenerClientes();
  const hoyStr   = hoy();
  const mesActual = hoyStr.slice(0, 7); // "YYYY-MM"

  let activasHoy  = 0;
  let ingresosMes = 0;

  DB.obtenerTurnosPorFecha(hoyStr).forEach(t => {
    if (['reservado', 'pendiente', 'pagado'].includes(t.estado)) activasHoy++;
  });

  DB.obtenerReservas().forEach(r => {
    if (r.estadoPago === 'pagado') {
      const turno  = DB.obtenerTurnoPorId(r.turnoId);
      const cancha = turno ? DB.obtenerCanchaPorId(turno.canchaId) : null;
      if (turno && cancha && turno.fecha.startsWith(mesActual)) {
        ingresosMes += cancha.precio;
      }
    }
  });

  document.getElementById('clStats').innerHTML = `
    <div class="cl-stat">
      <div class="cl-stat__num">${clientes.length}</div>
      <div class="cl-stat__lbl">Clientes registrados</div>
    </div>
    <div class="cl-stat">
      <div class="cl-stat__num">${activasHoy}</div>
      <div class="cl-stat__lbl">Reservas hoy</div>
    </div>
    <div class="cl-stat">
      <div class="cl-stat__num">$${ingresosMes.toLocaleString('es-AR')}</div>
      <div class="cl-stat__lbl">Ingresos del mes</div>
    </div>
  `;
}

/**
 * Renderiza la grilla de tarjetas de clientes, opcionalmente filtrada
 * por un texto de búsqueda (nombre o teléfono).
 */
function renderClientes(filtro = '') {
  renderStatsClientes();

  const hoyStr  = hoy();
  let clientes  = DB.obtenerClientes();
  const query   = filtro.toLowerCase().trim();

  if (query) {
    clientes = clientes.filter(c =>
      c.nombre.toLowerCase().includes(query) || c.telefono.includes(query)
    );
  }

  // Ordenar alfabéticamente
  clientes.sort((a, b) => a.nombre.localeCompare(b.nombre, 'es'));

  const grid = document.getElementById('clGrid');

  if (clientes.length === 0) {
    grid.innerHTML = `
      <div class="cl-empty" style="grid-column:1/-1">
        <div class="cl-empty__icon">👤</div>
        <div class="cl-empty__msg">${query ? 'No se encontraron clientes con ese criterio.' : 'Todavía no hay clientes registrados.'}</div>
      </div>`;
    return;
  }

  grid.innerHTML = '';
  clientes.forEach(cliente => {
    const stats      = obtenerEstadisticasCliente(cliente.id);
    const turnosHoy  = DB.obtenerTurnosPorFecha(hoyStr);
    const tieneHoy   = DB.obtenerReservasPorCliente(cliente.id)
      .some(r => turnosHoy.find(t => t.id === r.turnoId && ['reservado','pendiente','pagado'].includes(t.estado)));

    const card = document.createElement('div');
    card.className = 'cl-card';
    card.innerHTML = `
      <div class="cl-card__head">
        <div class="cl-card__avatar" style="${avatarStyle(cliente.id)}">${iniciales(cliente.nombre)}</div>
        <div style="flex:1;min-width:0">
          <div class="cl-card__name">${cliente.nombre}</div>
          <div class="cl-card__phone">${cliente.telefono}</div>
        </div>
        ${stats.totalGastado > 0 ? `<div style="font-size:14px;font-weight:700;color:var(--accent);flex-shrink:0">$${stats.totalGastado.toLocaleString('es-AR')}</div>` : ''}
      </div>
      <div class="cl-card__foot">
        <span class="cl-chip">${stats.total} reserva${stats.total !== 1 ? 's' : ''}</span>
        ${stats.pagadas > 0 ? `<span class="cl-chip cl-chip--pagado">${stats.pagadas} pagada${stats.pagadas !== 1 ? 's' : ''}</span>` : ''}
        ${stats.activas > 0 ? `<span class="cl-chip cl-chip--activo">${stats.activas} activa${stats.activas !== 1 ? 's' : ''}</span>` : ''}
        ${tieneHoy ? `<span class="cl-chip cl-chip--hoy">Hoy</span>` : ''}
      </div>`;
    card.addEventListener('click', () => abrirDetalleCliente(cliente.id));
    grid.appendChild(card);
  });
}

        const existente = DB.obtenerClientePorTelefono(telefono.trim());

  btnCerrar.className   = 'btn btn--ghost';

  foot.appendChild(btnCerrar);

  document.getElementById('overlay').classList.add('active');
  setTimeout(() => document.getElementById('fNombre')?.focus(), 50);

/* ====================================================================
   REPORTES — ESTADO DE UI
==================================================================== */
const REPORT = {
  periodo:      'diario',
  ref:          hoy(),
  desdeCustom:  hoy(),
  hastaCustom:  hoy(),
};

/* ====================================================================
   REPORTES — UTILIDADES DE FECHAS
==================================================================== */

/** Devuelve la fecha 'YYYY-MM-DD' del lunes de la semana que contiene 'fecha'. */
function getLunes(fecha) {
  const [y, m, d] = fecha.split('-').map(Number);
  const dt  = new Date(Date.UTC(y, m - 1, d));
  const dow = dt.getUTCDay();
  const diff = dow === 0 ? -6 : 1 - dow;
  dt.setUTCDate(dt.getUTCDate() + diff);
  return dt.toISOString().split('T')[0];
}

/** Devuelve array de todas las fechas 'YYYY-MM-DD' entre desde y hasta inclusive. */
function getFechasEnRango(desde, hasta) {
  const out = [];
  let cur = desde;
  while (cur <= hasta) { out.push(cur); cur = sumarDias(cur, 1); }
  return out;
}

/** Devuelve { desde, hasta } para el período y referencia dados. */
function getRango(periodo, ref) {
  switch (periodo) {
    case 'diario':  return { desde: ref, hasta: ref };
    case 'semanal': { const l = getLunes(ref); return { desde: l, hasta: sumarDias(l, 6) }; }
    case 'mensual': {
      const [y, m] = ref.split('-').map(Number);
      const desde = `${String(y).padStart(4,'0')}-${String(m).padStart(2,'0')}-01`;
      const hasta = new Date(Date.UTC(y, m, 0)).toISOString().split('T')[0];
      return { desde, hasta };
    }
    case 'anual': {
      const y = ref.split('-')[0];
      return { desde: `${y}-01-01`, hasta: `${y}-12-31` };
    }
    case 'custom':
      return { desde: REPORT.desdeCustom, hasta: REPORT.hastaCustom };
  }
}

/** Mueve la referencia del reporte al período anterior (-1) o siguiente (+1). */
function navReporte(dir) {
  const { periodo, ref } = REPORT;
  if (periodo === 'custom')  return; // flechas deshabilitadas en custom
  if (periodo === 'diario')  { REPORT.ref = sumarDias(ref, dir); }
  if (periodo === 'semanal') { REPORT.ref = sumarDias(ref, dir * 7); }
  if (periodo === 'mensual') {
    const [y, m] = ref.split('-').map(Number);
    REPORT.ref = new Date(Date.UTC(y, m - 1 + dir, 1)).toISOString().split('T')[0];
  }
  if (periodo === 'anual') {
    REPORT.ref = `${parseInt(ref) + dir}-01-01`;
  }
  renderReportes();
}

/** Formatea una fecha como "17 abr". */
function fCorta(fecha) {
  const [y, m, d] = fecha.split('-').map(Number);
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${d} ${meses[m - 1]}`;
}

/** Etiqueta legible del período activo. */
function labelPeriodo(periodo, ref) {
  const { desde, hasta } = getRango(periodo, ref);
  if (periodo === 'diario')  return formatFecha(desde);
  if (periodo === 'semanal') return `${fCorta(desde)} — ${fCorta(hasta)}`;
  if (periodo === 'mensual') {
    const [y, m] = desde.split('-').map(Number);
    const s = new Date(Date.UTC(y, m-1, 1))
      .toLocaleDateString('es-AR', { month: 'long', year: 'numeric', timeZone: 'UTC' });
    return s.charAt(0).toUpperCase() + s.slice(1);
  }
  if (periodo === 'anual')  return desde.split('-')[0];
  if (periodo === 'custom') return `${fCorta(REPORT.desdeCustom)} — ${fCorta(REPORT.hastaCustom)}`;
}

/* ====================================================================
   REPORTES — SEGMENTOS DEL GRÁFICO
   Divide el período en barras según la granularidad del período.
==================================================================== */

/**
 * Genera los segmentos del gráfico de barras según el período.
 * Diario → una barra por cancha.
 * Semanal → una barra por día.
 * Mensual → una barra por semana del mes.
 * Anual → una barra por mes.
 */
function calcularSegmentos(desde, hasta, periodo) {
  const DIAS  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

  if (periodo === 'diario') {
    return DB.obtenerCanchas().map(c => ({
      label: c.nombre, desde, hasta, canchaId: c.id, ingresos: 0, ocupados: 0,
    }));
  }
  if (periodo === 'semanal') {
    return getFechasEnRango(desde, hasta).map(f => {
      const [y, m, d] = f.split('-').map(Number);
      const dow = new Date(Date.UTC(y, m-1, d)).getUTCDay();
      return { label: DIAS[dow], desde: f, hasta: f, ingresos: 0, ocupados: 0 };
    });
  }
  if (periodo === 'mensual') {
    const [y, m] = desde.split('-').map(Number);
    const lastDay = new Date(Date.UTC(y, m, 0)).getUTCDate();
    const segs = [];
    for (let s = 1; s <= lastDay; s += 7) {
      const e = Math.min(s + 6, lastDay);
      segs.push({
        label: `${s}–${e}`,
        desde: `${String(y).padStart(4,'0')}-${String(m).padStart(2,'0')}-${String(s).padStart(2,'0')}`,
        hasta: `${String(y).padStart(4,'0')}-${String(m).padStart(2,'0')}-${String(e).padStart(2,'0')}`,
        ingresos: 0, ocupados: 0,
      });
    }
    return segs;
  }
  if (periodo === 'anual') {
    const y = parseInt(desde.split('-')[0]);
    return Array.from({ length: 12 }, (_, i) => {
      const mp = String(i + 1).padStart(2, '0');
      const lastD = new Date(Date.UTC(y, i + 1, 0)).toISOString().split('T')[0];
      return { label: MESES[i], desde: `${y}-${mp}-01`, hasta: lastD, ingresos: 0, ocupados: 0 };
    });
  }
  if (periodo === 'custom') {
    const dias = getFechasEnRango(desde, hasta).length;
    if (dias <= 1)  return calcularSegmentos(desde, hasta, 'diario');
    if (dias <= 60) return getFechasEnRango(desde, hasta).map(f => {
      const [y,m,d] = f.split('-').map(Number);
      return { label: `${d}/${m}`, desde: f, hasta: f, ingresos: 0, ocupados: 0 };
    });
    // > 60 días: agrupar por semana
    const segs = []; let cur = desde;
    while (cur <= hasta) {
      const fin = sumarDias(cur, 6) <= hasta ? sumarDias(cur, 6) : hasta;
      segs.push({ label: fCorta(cur), desde: cur, hasta: fin, ingresos: 0, ocupados: 0 });
      cur = sumarDias(fin, 1);
    }
    return segs;
  }
  return [];
}

/* ====================================================================
   REPORTES — CÁLCULO DE ESTADÍSTICAS
==================================================================== */

/**
 * Calcula todas las métricas del período: KPIs, por cancha, segmentos,
 * top clientes y detalle de turnos.
 * Futuro: GET /api/reportes?desde=X&hasta=Y&periodo=Z
 */
function calcularStats(desde, hasta, periodo) {
  const canchas    = DB.obtenerCanchas();
  const todasRes   = DB.obtenerReservas();
  const clientes   = DB.obtenerClientes();
  const fechas     = getFechasEnRango(desde, hasta);
  const turnos     = DB.obtenerTodosTurnos().filter(t => t.fecha >= desde && t.fecha <= hasta);
  const segs       = calcularSegmentos(desde, hasta, periodo);

  // Total teórico: slots que podrían existir aunque no estén generados
  let totalTeorico = 0;
  canchas.forEach(c => {
    totalTeorico += Math.floor((hm(CONFIG.HORA_CIERRE) - hm(CONFIG.HORA_APERTURA)) / c.duracionTurno) * fechas.length;
  });

  // Inicializar acumuladores por cancha
  const porCancha = {};
  canchas.forEach(c => {
    const xDia = Math.floor((hm(CONFIG.HORA_CIERRE) - hm(CONFIG.HORA_APERTURA)) / c.duracionTurno);
    porCancha[c.id] = { cancha: c, ingresos: 0, ocupados: 0, teorico: xDia * fechas.length };
  });

  let ingresosCobrados = 0, ingresosPrevistos = 0, turnosOcupados = 0, cancelaciones = 0;
  const detalle = [];

  turnos.forEach(t => {
    const cancha  = DB.obtenerCanchaPorId(t.canchaId);
    if (!cancha) return;

    const reserva = todasRes.find(r =>
      r.turnoId === t.id && r.estado !== 'cancelada' && r.estado !== 'rechazada'
    );
    const cliente = reserva ? clientes.find(c => c.id === reserva.clienteId) : null;

    if (!['disponible','bloqueado'].includes(t.estado)) turnosOcupados++;
    if (t.estado === 'rechazado') cancelaciones++;

    if (t.estado === 'pagado') {
      ingresosCobrados  += cancha.precio;
      ingresosPrevistos += cancha.precio;
      porCancha[t.canchaId].ingresos += cancha.precio;
      porCancha[t.canchaId].ocupados++;
    } else if (['reservado','pendiente'].includes(t.estado)) {
      ingresosPrevistos += cancha.precio;
      porCancha[t.canchaId].ocupados++;
    }

    // Acumular en el segmento correcto
    const seg = segs.find(s =>
      t.fecha >= s.desde && t.fecha <= s.hasta &&
      (!s.canchaId || s.canchaId === t.canchaId)
    );
    if (seg) {
      if (t.estado === 'pagado') seg.ingresos += cancha.precio;
      if (!['disponible','bloqueado'].includes(t.estado)) seg.ocupados++;
    }

    detalle.push({ turno: t, cancha, reserva, cliente });
  });

  // Ordenar detalle: más reciente primero
  detalle.sort((a, b) =>
    b.turno.fecha !== a.turno.fecha
      ? b.turno.fecha.localeCompare(a.turno.fecha)
      : a.turno.horaInicio.localeCompare(b.turno.horaInicio)
  );

  // Top 5 clientes por monto pagado
  const acCliente = {};
  todasRes.forEach(r => {
    if (r.estado === 'cancelada' || r.estado === 'rechazada') return;
    const t = turnos.find(x => x.id === r.turnoId);
    if (!t) return;
    const c = DB.obtenerCanchaPorId(t.canchaId);
    if (!c) return;
    if (!acCliente[r.clienteId]) acCliente[r.clienteId] = { reservas: 0, pagado: 0 };
    acCliente[r.clienteId].reservas++;
    if (r.estadoPago === 'pagado') acCliente[r.clienteId].pagado += c.precio;
  });

  const topClientes = Object.entries(acCliente)
    .map(([cid, s]) => ({ cliente: clientes.find(c => c.id === cid), ...s }))
    .filter(x => x.cliente)
    .sort((a, b) => b.pagado - a.pagado || b.reservas - a.reservas)
    .slice(0, 5);

  const ocupacionPct = totalTeorico > 0 ? Math.round(turnosOcupados / totalTeorico * 100) : 0;

  return {
    ingresosCobrados, ingresosPrevistos,
    turnosOcupados, totalTeorico, cancelaciones, ocupacionPct,
    segmentos: segs, porCancha, topClientes, detalle,
  };
}

/** Renderiza el panel completo de reportes. */
function renderReportes() {
  const { periodo, ref } = REPORT;
  const { desde, hasta } = getRango(periodo, ref);
  document.getElementById('rLabel').textContent = labelPeriodo(periodo, ref);
  const stats = calcularStats(desde, hasta, periodo);
  renderKpis(stats);
  renderReporteBody(stats, periodo);
}

/** Renderiza los 4 KPI cards. */
function renderKpis(stats) {
  const { ingresosCobrados, ingresosPrevistos, turnosOcupados, totalTeorico, cancelaciones, ocupacionPct } = stats;
  document.getElementById('rKpis').innerHTML = `
    <div class="kpi-card" style="border-top:3px solid #3fb950">
      <div class="kpi-card__num">$${ingresosCobrados.toLocaleString('es-AR')}</div>
      <div class="kpi-card__lbl">Ingresos cobrados</div>
      <div class="kpi-card__sub">Previsto: $${ingresosPrevistos.toLocaleString('es-AR')}</div>
    </div>
    <div class="kpi-card" style="border-top:3px solid #2f81f7">
      <div class="kpi-card__num">${turnosOcupados}</div>
      <div class="kpi-card__lbl">Turnos con actividad</div>
      <div class="kpi-card__sub">de ${totalTeorico} posibles</div>
    </div>
    <div class="kpi-card" style="border-top:3px solid #a371f7">
      <div class="kpi-card__num">${ocupacionPct}%</div>
      <div class="kpi-card__lbl">Ocupación</div>
      <div class="kpi-card__sub">
        <div class="kpi-bar"><div class="kpi-bar__fill" style="width:${ocupacionPct}%;background:#a371f7"></div></div>
      </div>
    </div>
    <div class="kpi-card" style="border-top:3px solid #f85149">
      <div class="kpi-card__num">${cancelaciones}</div>
      <div class="kpi-card__lbl">Cancelaciones</div>
      <div class="kpi-card__sub">turnos rechazados</div>
    </div>`;
}

/** Renderiza las secciones de gráficos, por cancha, top clientes y detalle. */
function renderReporteBody(stats, periodo) {
  const grafTitulos = {
    diario: 'Ingresos por cancha',
    semanal: 'Ingresos por día de la semana',
    mensual: 'Ingresos por semana del mes',
    anual: 'Ingresos por mes',
  };

  const maxSeg = Math.max(...stats.segmentos.map(s => s.ingresos), 1);
  let html = '';

  // ── Gráfico de tendencia ─────────────────────────────────────────
  html += `<div class="report-section">
    <div class="report-section__title">${grafTitulos[periodo]}</div>
    <div class="chart-wrap">`;

  stats.segmentos.forEach(s => {
    const pct = Math.round(s.ingresos / maxSeg * 100);
    html += `
      <div class="chart-row">
        <div class="chart-row__label">${s.label}</div>
        <div class="chart-row__track"><div class="chart-row__fill" style="width:${pct || 0}%"></div></div>
        <div class="chart-row__value">${s.ingresos > 0 ? '$' + s.ingresos.toLocaleString('es-AR') : '—'}</div>
      </div>`;
  });
  html += `</div></div>`;

  // ── Por cancha ────────────────────────────────────────────────────
  const canchas = Object.values(stats.porCancha);
  const maxIng  = Math.max(...canchas.map(c => c.ingresos), 1);

  html += `<div class="report-section">
    <div class="report-section__title">Por cancha</div>
    <div class="cancha-grid">`;

  canchas.forEach(({ cancha, ingresos, ocupados, teorico }) => {
    const pctIng  = Math.round(ingresos / maxIng * 100);
    const pctOcup = teorico > 0 ? Math.round(ocupados / teorico * 100) : 0;
    html += `
      <div class="cancha-card">
        <div class="cancha-card__name">${cancha.nombre}</div>
        <div class="cancha-card__sport">${cancha.deporte} · ${cancha.duracionTurno} min</div>
        <div class="cancha-card__ing">$${ingresos.toLocaleString('es-AR')}</div>
        <div class="chart-row" style="margin-top:8px">
          <div class="chart-row__label">Ingresos</div>
          <div class="chart-row__track"><div class="chart-row__fill" style="width:${pctIng}%"></div></div>
        </div>
        <div class="chart-row" style="margin-top:6px">
          <div class="chart-row__label">Ocup.</div>
          <div class="chart-row__track"><div class="chart-row__fill chart-row__fill--reservado" style="width:${pctOcup}%"></div></div>
          <div class="chart-row__value">${pctOcup}%</div>
        </div>
      </div>`;
  });
  html += `</div></div>`;

  // ── Top clientes ──────────────────────────────────────────────────
  if (stats.topClientes.length > 0) {
    html += `<div class="report-section">
      <div class="report-section__title">Top clientes del período</div>
      <div class="top-clientes">`;
    stats.topClientes.forEach(({ cliente, reservas, pagado }, i) => {
      html += `
        <div class="top-cliente">
          <span class="top-cliente__rank">${i + 1}</span>
          <div class="top-cliente__avatar">${iniciales(cliente.nombre)}</div>
          <div class="top-cliente__info">
            <div class="top-cliente__name">${cliente.nombre}</div>
            <div class="top-cliente__phone">${cliente.telefono}</div>
          </div>
          <div class="top-cliente__stats">
            <span>${reservas} reserva${reservas !== 1 ? 's' : ''}</span>
            <strong>$${pagado.toLocaleString('es-AR')}</strong>
          </div>
        </div>`;
    });
    html += `</div></div>`;
  }

  // ── Detalle de turnos ─────────────────────────────────────────────
  const activos = stats.detalle.filter(d => !['disponible','bloqueado'].includes(d.turno.estado));

  html += `<div class="report-section">
    <div class="report-section__title">Detalle de turnos${activos.length > 0 ? ` (${activos.length})` : ''}</div>`;

  if (activos.length === 0) {
    html += `<div style="text-align:center;padding:40px;color:var(--text-muted);font-size:.88rem">Sin actividad en este período.</div>`;
  } else {
    html += `<div class="hist-wrap" style="max-height:360px">
      <table class="hist-table">
        <thead><tr><th>Fecha</th><th>Cancha</th><th>Horario</th><th>Cliente</th><th>Estado</th><th>Monto</th></tr></thead>
        <tbody>
          ${activos.map(({ turno, cancha, cliente }) => `
            <tr>
              <td>${fCorta(turno.fecha)}</td>
              <td>${cancha.nombre}</td>
              <td>${turno.horaInicio}–${turno.horaFin}</td>
              <td>${cliente ? cliente.nombre : '—'}</td>
              <td><span class="badge badge--${turno.estado}" style="margin:0;padding:2px 8px;font-size:.68rem">${LABELS[turno.estado]}</span></td>
              <td>$${cancha.precio.toLocaleString('es-AR')}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  }
  html += `</div>`;

  document.getElementById('rBody').innerHTML = html;
}

/**
 * Cambia la vista activa (recepcion | clientes) y actualiza las tabs.
 * Mutua exclusión: solo una vista visible a la vez.
 */
function cambiarVista(vista) {
  document.body.setAttribute('data-view', vista);
  // Sidebar (desktop)
  document.querySelectorAll('.sidebar__item').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === vista);
  });
  // Bottom tabs (mobile)
  document.querySelectorAll('.bottom-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.view === vista);
  });
  // Page header titles
  const TITLES = { recepcion: 'Recepción', clientes: 'Clientes', reportes: 'Reportes', admin: 'Administración' };
  const SUBS   = { recepcion: 'Turnos del día', clientes: 'Gestión de clientes', reportes: 'Estadísticas', admin: 'Configuración' };
  const titleEl = document.getElementById('pageHeaderTitle');
  const subEl   = document.getElementById('pageHeaderSub');
  const mobileEl = document.getElementById('mobileViewTitle');
  if (titleEl)  titleEl.textContent  = TITLES[vista] || vista;
  if (subEl)    subEl.textContent    = SUBS[vista]   || '';
  if (mobileEl) mobileEl.textContent = TITLES[vista] || vista;
  // Render
  if (vista === 'recepcion') renderGrilla();
  if (vista === 'clientes')  renderClientes();
  if (vista === 'reportes')  renderReportes();
  if (vista === 'admin')     renderAdmin();
}

/**
 * Actualiza el badge de pendientes en la pestaña de Recepción.
 * Se llama al inicializar y cada vez que cambia un estado.
 */
function actualizarBadgePendientes() {
  const pendientes = DB.obtenerTurnosPorFecha(hoy()).filter(t => t.estado === 'pendiente').length;
  const badge = document.getElementById('badgePendientes');
  badge.style.display = pendientes > 0 ? '' : 'none';
  badge.textContent   = pendientes;
}

/** Devuelve el emoji que representa un deporte. */
function iconoDeporte(deporte) {
  const map = { 'Pádel':'🎾', 'Fútbol':'⚽', 'Tenis':'🎾', 'Básquet':'🏀', 'Voley':'🏐', 'Natación':'🏊' };
  return map[deporte] || '🏟';
}

/**
 * Valida y crea una cancha nueva.
 * Lanza Error si los datos no son válidos.
 * Futuro: POST /api/canchas
 */
function crearCanchaAdmin(datos) {
  validarDatosCancha(datos);
  return DB.guardarCancha({
    id:            uid('c'),
    nombre:        datos.nombre.trim(),
    deporte:       datos.deporte.trim(),
    duracionTurno: Number(datos.duracion),
    precio:        Number(datos.precio),
    activa:        true,
  });
}

/**
 * Valida y actualiza una cancha existente.
 * Futuro: PATCH /api/canchas/:id
 */
function editarCanchaAdmin(id, datos) {
  validarDatosCancha(datos);
  const canchaActual  = DB.obtenerCanchaPorId(id);
  const nuevaDuracion = Number(datos.duracion);
  const cambioDuracion = canchaActual && nuevaDuracion !== canchaActual.duracionTurno;

  DB.actualizarCancha(id, {
    nombre:        datos.nombre.trim(),
    deporte:       datos.deporte.trim(),
    duracionTurno: nuevaDuracion,
    precio:        Number(datos.precio),
  });

  if (cambioDuracion) {
    const hoyStr    = hoy();
    const aEliminar = DB._cache.turnos.filter(
      t => t.canchaId === id && t.estado === 'disponible' && t.fecha >= hoyStr
    );
    DB._cache.turnos = DB._cache.turnos.filter(
      t => !(t.canchaId === id && t.estado === 'disponible' && t.fecha >= hoyStr)
    );
    aEliminar.forEach(t =>
      DB._sync(() => DB._q(`/turnos?id=eq.${t.id}`, { method: 'DELETE' }))
    );
    asegurarTurnosDia(UI.fechaActual);
  }
}

/** Valida los campos comunes de un formulario de cancha. */
function validarDatosCancha(datos) {
  if (!datos.nombre?.trim() || datos.nombre.trim().length < 2)
    throw new Error('El nombre debe tener al menos 2 caracteres.');
  if (!datos.deporte?.trim() || datos.deporte.trim().length < 2)
    throw new Error('El deporte debe tener al menos 2 caracteres.');
  if (![60, 90].includes(Number(datos.duracion)))
    throw new Error('La duración debe ser 60 o 90 minutos.');
  if (!datos.precio || Number(datos.precio) <= 0)
    throw new Error('El precio debe ser mayor a cero.');
}

/**
 * Elimina una cancha si no tiene reservas activas asociadas.
 * Futuro: DELETE /api/canchas/:id
 */
function eliminarCanchaAdmin(canchaId) {
  const turnosActivos = DB.obtenerTodosTurnos().filter(
    t => t.canchaId === canchaId && ['reservado','pendiente','pagado'].includes(t.estado)
  );
  if (turnosActivos.length > 0)
    throw new Error(`Esta cancha tiene ${turnosActivos.length} turno(s) activo(s). Cancelalos antes de eliminar.`);
  DB.eliminarCancha(canchaId);
}

/**
 * Aplica la configuración guardada al CONFIG global y a la UI.
 * Se llama al inicializar y al guardar cambios.
 */
function aplicarConfig() {
  const cfg = DB.obtenerConfig();
  if (cfg.horaApertura) CONFIG.HORA_APERTURA = cfg.horaApertura;
  if (cfg.horaCierre)   CONFIG.HORA_CIERRE   = cfg.horaCierre;

  const nombre    = cfg.nombre    || '';
  const emoji     = cfg.emoji     || '⚽';
  const subtitulo = cfg.subtitulo || 'Gestión de canchas';

  if (nombre) {
    const sidebarTitle = document.getElementById('sidebarTitle');
    if (sidebarTitle) sidebarTitle.textContent = nombre;
    document.title = nombre + ' — Panel de Recepción';
  }

  // logo hardcodeado en HTML

  document.querySelectorAll('.sidebar__logo-sub, .mobile-header__sub').forEach(el => {
    el.textContent = subtitulo;
  });
}

/** Renderiza las tarjetas de canchas en el panel admin. */
function renderCanchasAdmin() {
  const canchas = DB.obtenerCanchas();
  const grid    = document.getElementById('adminCourts');

  if (canchas.length === 0) {
    grid.innerHTML = `<div style="color:var(--text-muted);font-size:.88rem;padding:8px 0">
      No hay canchas registradas. Creá una con el botón +.</div>`;
    return;
  }

  grid.innerHTML = '';
  canchas.forEach(cancha => {
    const activa = cancha.activa !== false;
    const sportCol = cancha.deporte?.toLowerCase().includes('fútbol') || cancha.deporte?.toLowerCase().includes('futbol')
      ? '#3fb950' : '#2f81f7';
    const card   = document.createElement('div');
    card.className = 'admin-court' + (activa ? '' : ' inactiva');
    card.style.borderTop = `3px solid ${sportCol}`;

    card.innerHTML = `
      <span class="admin-court__icon">${iconoDeporte(cancha.deporte)}</span>
      <div class="admin-court__name">${cancha.nombre}</div>
      <div class="admin-court__sport">${cancha.deporte}</div>
      <div class="admin-court__chips">
        <span class="cl-chip">${cancha.duracionTurno} min</span>
      </div>

            <span class="toggle__rail"></span>
          </label>

      </div>`;

  });

  // Delegación de eventos en la grilla
  grid.onclick = e => {
    const btn = e.target.closest('[data-accion]');
    if (!btn) return;
    const { accion, id } = btn.dataset;
    if (accion === 'editar')   abrirFormCancha(id);
    if (accion === 'eliminar') acEliminarCancha(id);
  };
  grid.onchange = e => {
    const input = e.target.closest('[data-accion="toggle"]');
    if (input) acToggleCancha(input.dataset.id, input.checked);
  };
}

/**

function abrirFormCancha(canchaId = null) {
  const cancha  = canchaId ? DB.obtenerCanchaPorId(canchaId) : null;

  document.getElementById('mTitle').textContent = esNueva ? 'Nueva cancha' : 'Editar cancha';
  document.getElementById('mSub').textContent   = esNueva

    <div class="form-group">
      <label for="fCNombre">Nombre de la cancha</label>
      <input id="fCNombre" type="text" placeholder="Ej: Pádel 3"

      </div>
      <div class="form-group">
        <label for="fCPrecio">Precio por turno ($)</label>
        <input id="fCPrecio" type="number" min="1" placeholder="Ej: 2500"
               value="${cancha ? cancha.precio : ''}" />
      </div>
    </div>`;

  const foot = document.getElementById('mFoot');
  foot.innerHTML = '';

  const btnGuardar = document.createElement('button');
  btnGuardar.className   = 'btn btn--success';
  btnGuardar.textContent = esNueva ? 'Crear cancha' : 'Guardar cambios';
  btnGuardar.addEventListener('click', () => {
    const datos = {
      nombre:   document.getElementById('fCNombre').value,
      deporte:  document.getElementById('fCDeporte').value,
      duracion: document.getElementById('fCDuracion').value,
      precio:   document.getElementById('fCPrecio').value,

    try {

        cerrarModal(); renderCanchasAdmin();

/** Activa o desactiva una cancha. */

  renderCanchasAdmin();
  // Refrescar la grilla si está visible para reflejar el cambio
  if (document.body.getAttribute('data-view') === 'recepcion') renderGrilla();

  const cancha = DB.obtenerCanchaPorId(canchaId);

  try {

/** Guarda la configuración del complejo y la aplica al instante. */
function acGuardarConfig() {
  const nombre    = document.getElementById('cfgNombre').value.trim();
  const emoji     = '⚽'; // legacy, ya no se usa en UI
  const subtitulo = document.getElementById('cfgSubtitulo').value.trim() || 'Gestión de canchas';
  const apertura  = document.getElementById('cfgApertura').value;
  const cierre    = document.getElementById('cfgCierre').value;

  if (!nombre)   { toast('El nombre del complejo no puede estar vacío.', 'warning'); return; }
  if (!apertura || !cierre) { toast('Completá los horarios de apertura y cierre.', 'warning'); return; }
  if (apertura >= cierre)   { toast('La hora de apertura debe ser anterior al cierre.', 'error'); return; }

  // Detectar cambio de horario ANTES de guardar
  const cfgActual    = DB.obtenerConfig();
  const cambioHorario = cfgActual.horaApertura !== apertura || cfgActual.horaCierre !== cierre;

  DB.guardarConfig({ nombre, emoji, subtitulo, horaApertura: apertura, horaCierre: cierre });
  aplicarConfig();

  if (cambioHorario) {
    // Eliminar todos los turnos "disponible" del día visible para regenerarlos
    // con el nuevo horario (turnos reservados/pagados no se tocan)
    const fechaHoy = UI.fechaActual;
    const aEliminar = DB._cache.turnos.filter(t => t.fecha === fechaHoy && t.estado === 'disponible');
    DB._cache.turnos = DB._cache.turnos.filter(t => !(t.fecha === fechaHoy && t.estado === 'disponible'));
    aEliminar.forEach(t => DB._sync(() => DB._q(`/turnos?id=eq.${t.id}`, { method: 'DELETE' })));
    // Pre-generar los nuevos slots con el horario actualizado
    asegurarTurnosDia(fechaHoy);
    toast('Configuración guardada. Horario actualizado ✓', 'success');
  } else {
    toast('Configuración guardada.', 'success');
  }
}

/* ====================================================================
   CALENDARIO POPOVER (datebar)
==================================================================== */
(function () {
  const pop  = document.getElementById('calPop');
  const lbl  = document.getElementById('lblFecha');
  const DAYS = ['L','M','X','J','V','S','D'];
  const MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  let calAno = null, calMes = null, calModoYM = false;

  function pad2(n) { return String(n).padStart(2,'0'); }

  function abrirCal() {
    const [y,m] = UI.fechaActual.split('-').map(Number);
    calAno = y; calMes = m; calModoYM = false;
    renderCal();
    pop.classList.add('open');
  }
  function cerrarCal() { pop.classList.remove('open'); calModoYM = false; }

  function renderCal() {
    if (calModoYM) { renderCalYM(); return; }

    const hoyStr   = hoy();
    const firstWd  = new Date(calAno, calMes - 1, 1).getDay();
    const offset   = (firstWd + 6) % 7;
    const daysInMo = new Date(calAno, calMes, 0).getDate();
    const labelRaw = new Date(calAno, calMes - 1, 1)
      .toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });
    const label = labelRaw.charAt(0).toUpperCase() + labelRaw.slice(1);

    let cells = '';
    for (let i = 0; i < offset; i++) cells += `<div class="cal-pop__day cp-empty"></div>`;
    for (let d = 1; d <= daysInMo; d++) {
      const f  = `${calAno}-${pad2(calMes)}-${pad2(d)}`;
      let cls  = 'cal-pop__day';
      if (f === UI.fechaActual) cls += ' cp-active';
      else if (f === hoyStr)   cls += ' cp-today';
      cells += `<div class="${cls}" data-f="${f}">${d}</div>`;
    }

    pop.innerHTML = `
      <div class="cal-pop__header">
        <button class="cal-pop__nav" id="cpPrev">‹</button>
        <button class="cal-pop__month-btn" id="cpMonthBtn">${label} <span class="cp-arrow">▾</span></button>
        <button class="cal-pop__nav" id="cpNext">›</button>
      </div>
      <div class="cal-pop__wdays">${DAYS.map(w=>`<div class="cal-pop__wd">${w}</div>`).join('')}</div>
      <div class="cal-pop__days" id="cpDays">${cells}</div>`;

    document.getElementById('cpMonthBtn').onclick = e => {
      e.stopPropagation(); calModoYM = true; renderCal();
    };
    document.getElementById('cpPrev').onclick = e => {
      e.stopPropagation();
      calMes--; if (calMes < 1) { calMes = 12; calAno--; } renderCal();
    };
    document.getElementById('cpNext').onclick = e => {
      e.stopPropagation();
      calMes++; if (calMes > 12) { calMes = 1; calAno++; } renderCal();
    };
    document.getElementById('cpDays').addEventListener('click', e => {
      e.stopPropagation();
      const cell = e.target.closest('.cal-pop__day');
      if (!cell || cell.classList.contains('cp-empty')) return;
      UI.fechaActual = cell.dataset.f;
      cerrarCal();
      renderGrilla();
    });
  }

  function renderCalYM() {
    const [hy] = hoy().split('-').map(Number);
    let html = '';
    for (let y = hy - 2; y <= hy + 4; y++) {
      const mHtml = MESES.map((mn, idx) => {
        const m = idx + 1;
        const isActive = (y === calAno && m === calMes);
        return `<div class="cp-ym-month${isActive ? ' cp-ym-active' : ''}" data-y="${y}" data-m="${m}">${mn}</div>`;
      }).join('');
      html += `<div class="cp-ym-year">${y}</div><div class="cp-ym-months">${mHtml}</div>`;
    }
    pop.innerHTML = `
      <div class="cal-pop__header">
        <button class="cal-pop__nav" id="cpYMBack">‹</button>
        <span class="cal-pop__month" style="font-size:12px">Ir a mes</span>
        <div style="width:26px"></div>
      </div>
      <div class="cp-ym-grid" id="cpYMGrid">${html}</div>`;

    document.getElementById('cpYMBack').onclick = e => {
      e.stopPropagation(); calModoYM = false; renderCal();
    };
    const grid = document.getElementById('cpYMGrid');
    setTimeout(() => { const el = grid.querySelector('.cp-ym-active'); if (el) el.scrollIntoView({ block: 'center' }); }, 0);
    grid.addEventListener('click', e => {
      e.stopPropagation();
      const cell = e.target.closest('.cp-ym-month');
      if (!cell) return;
      calAno = +cell.dataset.y; calMes = +cell.dataset.m;
      calModoYM = false; renderCal();
    });
  }

  lbl.addEventListener('click', e => {
    e.stopPropagation();
    pop.classList.contains('open') ? cerrarCal() : abrirCal();
  });
  document.addEventListener('click', e => {
    if (!pop.contains(e.target)) cerrarCal();
  });
})();

      const mH = MESES_R.map((mn, idx) => {
        const m = idx + 1;
        const isA = (y === anoV && m === mesV);
        return `<div class="cp-ym-month${isA?' cp-ym-active':''}" data-y="${y}" data-m="${m}">${mn}</div>`;
      }).join('');
      html += `<div class="cp-ym-year">${y}</div><div class="cp-ym-months">${mH}</div>`;
    }
    popEl.innerHTML = `
      <div class="cal-pop__header">
        <button class="cal-pop__nav" id="${pfx}YMBack">‹</button>
        <span class="cal-pop__month" style="font-size:12px">Ir a mes</span>
        <div style="width:26px"></div>
      </div>
      <div class="cp-ym-grid" id="${pfx}YMGrid">${html}</div>`;

    document.getElementById(`${pfx}YMBack`).onclick = e => {
      e.stopPropagation(); modoYMRef.val = false; renderFn();
    };
    const grid = document.getElementById(`${pfx}YMGrid`);
    setTimeout(() => { const el = grid.querySelector('.cp-ym-active'); if(el) el.scrollIntoView({block:'center'}); }, 0);
    grid.addEventListener('click', e => {
      e.stopPropagation();
      const cell = e.target.closest('.cp-ym-month');
      if (!cell) return;
      renderFn(+cell.dataset.y, +cell.dataset.m);
    });
  }

  /* ── Calendario Desde ── */
  const dYMRef = { val: false };
  function renderDesde(y, m) {
    if (y !== undefined) { dAno = y; dMes = m; dYMRef.val = false; }
    if (dYMRef.val) { buildCalYM(desdePop, dAno, dMes, dYMRef, renderDesde); return; }
    buildCalDays(desdePop, REPORT.desdeCustom, dAno, dMes, dYMRef, renderDesde, (action, val) => {
      if (action === 'prev') { dMes--; if(dMes<1){dMes=12;dAno--;} renderDesde(); }
      else if (action === 'next') { dMes++; if(dMes>12){dMes=1;dAno++;} renderDesde(); }
      else if (action === 'day') {
        REPORT.desdeCustom = val;
        if (REPORT.desdeCustom > REPORT.hastaCustom) REPORT.hastaCustom = REPORT.desdeCustom;
        syncBtns(); desdePop.classList.remove('open'); desdeBtn.classList.remove('rdb-open');
        renderDesde(); // refresca activo
      }
    });
  }

  /* ── Calendario Hasta ── */
  const hYMRef = { val: false };
  function renderHasta(y, m) {
    if (y !== undefined) { hAno = y; hMes = m; hYMRef.val = false; }
    if (hYMRef.val) { buildCalYM(hastaPop, hAno, hMes, hYMRef, renderHasta); return; }
    buildCalDays(hastaPop, REPORT.hastaCustom, hAno, hMes, hYMRef, renderHasta, (action, val) => {
      if (action === 'prev') { hMes--; if(hMes<1){hMes=12;hAno--;} renderHasta(); }
      else if (action === 'next') { hMes++; if(hMes>12){hMes=1;hAno++;} renderHasta(); }
      else if (action === 'day') {
        REPORT.hastaCustom = val;
        if (REPORT.hastaCustom < REPORT.desdeCustom) REPORT.desdeCustom = REPORT.hastaCustom;
        syncBtns(); hastaPop.classList.remove('open'); hastaBtn.classList.remove('rdb-open');
        renderHasta();
      }
    });
  }

  /* ── Botones toggle ── */
  function positionPop(popEl, btnEl) {
    const r = btnEl.getBoundingClientRect();
    popEl.style.top  = (r.bottom + 6) + 'px';
    popEl.style.left = r.left + 'px';
  }

  desdeBtn.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = desdePop.classList.contains('open');
    hastaPop.classList.remove('open'); hastaBtn.classList.remove('rdb-open');
    if (isOpen) { desdePop.classList.remove('open'); desdeBtn.classList.remove('rdb-open'); }
    else { initD(); renderDesde(); positionPop(desdePop, desdeBtn); desdePop.classList.add('open'); desdeBtn.classList.add('rdb-open'); }
  });
  hastaBtn.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = hastaPop.classList.contains('open');
    desdePop.classList.remove('open'); desdeBtn.classList.remove('rdb-open');
    if (isOpen) { hastaPop.classList.remove('open'); hastaBtn.classList.remove('rdb-open'); }
    else { initH(); renderHasta(); positionPop(hastaPop, hastaBtn); hastaPop.classList.add('open'); hastaBtn.classList.add('rdb-open'); }
  });

  desdePop.addEventListener('click', e => e.stopPropagation());
  hastaPop.addEventListener('click', e => e.stopPropagation());
  document.addEventListener('click', () => {
    desdePop.classList.remove('open'); desdeBtn.classList.remove('rdb-open');
    hastaPop.classList.remove('open'); hastaBtn.classList.remove('rdb-open');
  });

  /* ── Abrir/cerrar range-bar según período ── */
  function abrirRango() {
    initD(); initH(); syncBtns();
    rangeBar.style.display = 'flex';
    REPORT.periodo = 'custom';
    renderReportes();
  }
  function cerrarRango() {
    rangeBar.style.display = 'none';
    desdePop.classList.remove('open'); desdeBtn.classList.remove('rdb-open');
    hastaPop.classList.remove('open'); hastaBtn.classList.remove('rdb-open');
  }

  // Custom tab abre el range-bar
  document.getElementById('btnCustomTab').addEventListener('click', () => abrirRango());

  // Cualquier otra tab cierra el range-bar
  document.querySelectorAll('.period-btn:not(#btnCustomTab)').forEach(btn => {
    btn.addEventListener('click', () => cerrarRango());
  });

  // Aplicar recalcula reportes con el rango vigente
  btnApl.addEventListener('click', () => renderReportes());
})();

// Cerrar modal al hacer clic en el fondo oscuro
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) cerrarModal();
});
document.getElementById('mClose').addEventListener('click', cerrarModal);

// Cerrar con Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });

// Enter en el formulario de nueva reserva dispara la confirmación
document.getElementById('modal').addEventListener('keydown', e => {
  if (e.key === 'Enter' && UI.turnoActivoId) {
    const turno = DB.obtenerTurnoPorId(UI.turnoActivoId);
    if (turno?.estado === 'disponible') acConfirmar(UI.turnoActivoId);
  }
});

/* ====================================================================
   INICIALIZACIÓN
   Punto de entrada del sistema.
==================================================================== */
async function inicializar() {
  const loader = document.getElementById('loadingScreen');
  loader.style.display = 'flex';
  try {
    await DB.cargarTodo();
  } catch(e) {
    console.error('Error al conectar con Supabase:', e);
    toast('No se pudo conectar con la base de datos. Revisá tu conexión.', 'error', 6000);
  }
  loader.style.display = 'none';
  cargarDatosDePrueba();       // Solo carga canchas si la DB está vacía (primer uso)
  aplicarConfig();             // Aplica nombre y horarios guardados
  document.body.setAttribute('data-view', 'recepcion');
  renderGrilla();
  actualizarBadgePendientes();
  actualizarReloj();
  actualizarTodasLineasTiempo();
  setInterval(() => { actualizarReloj(); actualizarTodasLineasTiempo(); }, 1000);
}

if (!window._esperandoLogin) inicializar();
</script>
