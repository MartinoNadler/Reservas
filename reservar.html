<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Reservar turno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── Surfaces ── */
      --bg:    #050c1b;
      --sur-0: #0b1225;
      --sur-1: #101a30;
      --sur-2: #162038;
      --sur-3: #1c2844;

      /* ── Borders ── */
      --bd:     rgba(255,255,255,0.06);
      --bd-hi:  rgba(255,255,255,0.11);

      /* ── Header ── */
      --hdr: rgba(5,12,27,0.94);

      /* ── Blue accent ── */
      --blue:      #4a9eff;
      --blue-dim:  rgba(74,158,255,0.10);
      --blue-bd:   rgba(74,158,255,0.20);
      --blue-grad: linear-gradient(135deg,#2563eb,#5aabff);
      --blue-glow: rgba(74,158,255,0.22);

      /* ── Green / available ── */
      --green:     #22d47a;
      --green-dim: rgba(34,212,122,0.08);
      --green-bd:  rgba(34,212,122,0.20);

      /* ── Semantic ── */
      --amber:   #f59e0b;
      --red-dim: rgba(239,68,68,0.10);
      --red-bd:  rgba(239,68,68,0.20);

      /* ── Text ── */
      --t1: #eef2ff;
      --t2: rgba(200,218,255,0.68);
      --t3: rgba(180,200,255,0.38);
      --t4: rgba(160,185,255,0.18);

      /* ── Ease ── */
      --ease-out: cubic-bezier(.22,.68,0,1.2);

      /* ── Secondary (brand neutral) ── */
      --secondary:        #6b7280;
      --secondary-muted:  rgba(107,114,128,.15);
      --secondary-border: rgba(107,114,128,.30);

      /* ── Legacy aliases for JS-generated HTML ── */
      --accent:      var(--blue);
      --available:   var(--green);
      --availBg:     var(--green-dim);
      --availBorder: var(--green-bd);
      --pending:     var(--amber);
      --text:        var(--t1);
      --textMuted:   var(--t2);
      --textSub:     var(--t3);
    }

    html, body {
      min-height: 100%; background: var(--bg); color: var(--t1);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

    /* ── SCREENS ─────────────────────────────────────────────── */
    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; }

    /* ══════════════════════════════════════════════════════════
       AUTH
    ══════════════════════════════════════════════════════════ */
    .auth-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px; gap: 28px;
    }

    .auth-logo { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .auth-logo__icon {
      width: 68px; height: 68px; border-radius: 20px;
      background: var(--blue-grad);
      display: flex; align-items: center; justify-content: center;
      font-size: 33px; box-shadow: 0 12px 36px var(--blue-glow);
      overflow: hidden; flex-shrink: 0;
    }
    .auth-logo__icon img { width: 68px; height: 68px; object-fit: cover; display: block; }
    .auth-logo__name { font-size: 21px; font-weight: 800; color: var(--t1); letter-spacing: -.4px; }
    .auth-logo__sub  { font-size: 13px; color: var(--t3); }

    .auth-card {
      width: 100%; max-width: 400px;
      background: var(--sur-0); border: 1px solid var(--bd);
      border-radius: 20px; padding: 28px;
    }
    .auth-card__title { font-size: 18px; font-weight: 800; color: var(--t1); margin-bottom: 5px; letter-spacing: -.3px; }
    .auth-card__sub   { font-size: 13px; color: var(--t2); margin-bottom: 24px; line-height: 1.5; }

    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 11px; font-weight: 700;
      color: var(--t3); text-transform: uppercase;
      letter-spacing: .08em; margin-bottom: 7px;
    }
    .form-group input {
      width: 100%; background: var(--sur-1);
      border: 1px solid var(--bd); border-radius: 10px;
      padding: 11px 14px; font: 500 15px 'Inter', sans-serif;
      color: var(--t1); transition: border-color .15s, box-shadow .15s;
    }
    .form-group input:focus {
      outline: none; border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(74,158,255,.12);
    }
    .form-group input::placeholder { color: var(--t4); }
    .form-group input:disabled     { opacity: .35; cursor: not-allowed; }
    .form-group input.is-error     { border-color: rgba(239,68,68,.45); }
    .field-err { font-size: 11px; color: rgba(239,110,110,.85); margin-top: 5px; min-height: 16px; }

    /* ── BOTONES ─────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 11px 20px; border: 1px solid transparent; border-radius: 10px;
      font: 700 14px 'Inter', sans-serif; cursor: pointer;
      transition: filter .16s, transform .16s, background .16s;
      white-space: nowrap; text-align: center;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }
    .btn--full    { width: 100%; }

    .btn--primary {
      background: var(--blue-grad); color: #fff; border: none;
      box-shadow: 0 4px 18px var(--blue-glow);
    }
    .btn--primary:hover  { filter: brightness(1.1); transform: translateY(-1px); }
    .btn--primary:active { filter: brightness(.95); transform: translateY(0); }

    .btn--success {
      background: var(--blue-grad); color: #fff; border: none;
      box-shadow: 0 4px 18px var(--blue-glow);
      padding: 13px; font-size: 14px; border-radius: 11px;
    }
    .btn--success:hover { filter: brightness(1.08); }

    .btn--ghost {
      background: var(--sur-1); border-color: var(--bd); color: var(--t2);
    }
    .btn--ghost:hover { background: var(--sur-2); border-color: var(--bd-hi); color: var(--t1); }

    .btn--danger-soft {
      background: var(--red-dim); border: 1px solid var(--red-bd);
      color: rgba(239,100,100,.9); border-radius: 8px;
      padding: 6px 12px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn--danger-soft:hover { background: rgba(239,68,68,.16); }

    .btn--confirm-back {
      background: var(--green-dim); border: 1px solid var(--green-bd);
      color: var(--green); border-radius: 10px;
      padding: 12px; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: background .15s;
    }
    .btn--confirm-back:hover { background: rgba(34,212,122,.14); }

    .back-btn {
      background: none; border: none; color: var(--t3);
      font: 600 13px 'Inter', sans-serif; cursor: pointer;
      padding: 0; margin-bottom: 20px;
      display: flex; align-items: center; gap: 5px; transition: color .15s;
    }
    .back-btn:hover { color: var(--t1); }

    /* ══════════════════════════════════════════════════════════
       HEADER
    ══════════════════════════════════════════════════════════ */
    .main-header {
      height: 58px;
      background: var(--hdr);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding: 0 24px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 100;
    }
    @media (max-width:520px) { .main-header { height: 52px; padding: 0 16px; } }

    .main-header__logo {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--blue-grad);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(74,158,255,.28);
      overflow: hidden;
    }
    .main-header__logo img { width: 36px; height: 36px; object-fit: cover; display: block; }
    .main-header__info { flex: 1; min-width: 0; }
    .main-header__complex {
      font-size: 14px; font-weight: 700; color: var(--t1);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      letter-spacing: -.2px;
    }
    .main-header__user { font-size: 11px; color: var(--t3); margin-top: 1px; }
    .main-header__user span { color: var(--blue); font-weight: 600; }

    .btn--salir {
      background: var(--sur-1); border: 1px solid var(--bd);
      color: var(--t2); border-radius: 8px;
      padding: 7px 16px; font: 500 13px 'Inter', sans-serif;
      cursor: pointer; transition: all .15s; flex-shrink: 0;
    }
    .btn--salir:hover { background: var(--sur-2); color: var(--t1); border-color: var(--bd-hi); }

    /* ══════════════════════════════════════════════════════════
       LAYOUT
    ══════════════════════════════════════════════════════════ */
    .main-content {
      flex: 1; padding: 28px 32px 64px;
      max-width: 1400px; margin: 0 auto; width: 100%;
    }
    @media (max-width:1060px) { .main-content { padding: 24px 20px 56px; } }
    @media (max-width:520px)  { .main-content { padding: 20px 14px 48px; } }

    /* ── 2 COLUMNAS DESKTOP ─────────────────────────────────── */
    .booking-layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 36px;
      align-items: start;
    }
    @media (max-width:1060px) {
      .booking-layout { grid-template-columns: 1fr; gap: 28px; }
    }
    @media (max-width:520px) { .booking-layout { gap: 22px; } }

    .booking-left {
      display: flex; flex-direction: column; gap: 24px;
      position: sticky; top: 78px;
      align-self: start;
    }
    @media (max-width:1060px) {
      .booking-left { position: static; gap: 22px; }
    }

    .booking-right { min-width: 0; }

    /* ── PANEL CARD ─────────────────────────────────────────── */
    .panel-card {
      background: var(--sur-0);
      border: 1px solid var(--bd);
      border-radius: 16px;
      padding: 16px 18px 18px;
    }

    /* ══════════════════════════════════════════════════════════
       ACCORDION — MIS RESERVAS
    ══════════════════════════════════════════════════════════ */
    .accordion-trigger {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      background: none; border: none; border-bottom: 1px solid var(--bd);
      padding-bottom: 12px; margin-bottom: 2px; cursor: pointer; transition: border-color .2s;
    }
    .accordion-trigger.open { border-bottom-color: var(--blue-bd); }

    .accordion-trigger__left { display: flex; align-items: center; gap: 10px; }
    .accordion-trigger__label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .12em; color: var(--t3);
    }
    .accordion-badge {
      min-width: 20px; height: 20px; border-radius: 6px; padding: 0 5px;
      background: var(--blue-grad); color: #fff;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .accordion-arrow {
      font-size: 13px; color: var(--t3);
      transition: transform .25s ease; display: inline-block;
    }
    .accordion-trigger.open .accordion-arrow { transform: rotate(180deg); }

    .accordion-body { overflow: hidden; transition: max-height .3s ease; }
    .accordion-body.open   { max-height: 1000px; }
    .accordion-body.closed { max-height: 0; }

    /* ── TARJETA RESERVA ──────────────────────────────────── */
    .reserva-card {
      background: linear-gradient(135deg, rgba(74,158,255,.05), rgba(74,158,255,.02));
      border: 1px solid rgba(74,158,255,.10);
      border-radius: 12px; padding: 11px 14px;
      display: flex; align-items: center; gap: 11px;
      margin-top: 7px;
      transition: border-color .15s, background .15s;
    }
    .reserva-card:hover {
      border-color: rgba(74,158,255,.2);
      background: linear-gradient(135deg, rgba(74,158,255,.08), rgba(74,158,255,.03));
    }
    .reserva-card__icon {
      width: 34px; height: 34px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .reserva-card__main  { flex: 1; min-width: 0; }
    .reserva-card__court { font-size: 13px; font-weight: 700; color: var(--t1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .reserva-card__time  {
      font-size: 11px; color: var(--t2); margin-top: 2px;
      font-variant-numeric: tabular-nums; white-space: nowrap;
    }
    .reserva-card__right { text-align: right; flex-shrink: 0; }
    .reserva-card__price { font-size: 13px; font-weight: 700; color: var(--blue); }
    .reserva-card__badge {
      display: inline-block; margin-top: 3px;
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; padding: 2px 7px; border-radius: 5px;
    }
    .badge--confirmada { color: var(--green); background: var(--green-dim); }
    .badge--pendiente  { color: var(--amber); background: rgba(245,158,11,.10); }

    @media (max-width:520px) {
      .reserva-card { flex-wrap: wrap; gap: 9px; padding: 10px 12px; }
      .reserva-card__right { flex: 0 0 auto; }
    }

    .empty-reservas {
      margin-top: 10px;
      background: var(--sur-0); border: 1px solid var(--bd);
      border-radius: 12px; padding: 28px 20px;
      text-align: center; color: var(--t3); font-size: 13px;
    }

    /* ══════════════════════════════════════════════════════════
       SECCIÓN RESERVAR TURNO
    ══════════════════════════════════════════════════════════ */
    .section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .12em; color: var(--t3);
      border-bottom: 1px solid var(--bd);
      padding-bottom: 12px; margin-bottom: 16px;
    }

    /* ── MINI CALENDAR ──────────────────────────────────────── */
    .mini-cal { user-select: none; }

    .mini-cal__header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .mini-cal__month-label {
      font-size: 13px; font-weight: 700; color: var(--t1); letter-spacing: -.2px;
    }
    /* Botón clicable del mes en el header */
    .mini-cal__month-btn {
      background: none; border: none; cursor: pointer;
      font-size: 13px; font-weight: 700; color: var(--t1); letter-spacing: -.2px;
      display: flex; align-items: center; gap: 3px;
      padding: 2px 6px; border-radius: 7px; font-family: inherit;
      transition: background .13s;
    }
    .mini-cal__month-btn:hover { background: var(--sur-2); }
    .mini-cal__month-btn .mc-arrow { font-size: 10px; opacity: .55; }
    .mini-cal__nav {
      width: 28px; height: 28px; border-radius: 7px;
      background: var(--sur-1); border: 1px solid var(--bd);
      color: var(--t2); font-size: 15px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background .14s, color .14s;
    }
    .mini-cal__nav:hover:not(:disabled) { background: var(--sur-2); color: var(--t1); }
    .mini-cal__nav:disabled { opacity: .22; cursor: default; }

    .mini-cal__weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      margin-bottom: 3px;
    }
    .mini-cal__wd {
      text-align: center; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .04em;
      color: var(--t4); padding: 3px 0;
    }

    .mini-cal__days {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .mini-cal__day {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 500; color: var(--t2);
      border-radius: 8px; cursor: pointer;
      transition: background .12s, color .12s;
      position: relative; font-variant-numeric: tabular-nums;
    }
    .mini-cal__day:not(.mc-past):not(.mc-empty):hover { background: var(--sur-2); color: var(--t1); }
    .mini-cal__day.mc-past  { color: var(--t4); cursor: default; }
    .mini-cal__day.mc-empty { cursor: default; }
    .mini-cal__day.mc-today { color: var(--blue); font-weight: 700; }
    .mini-cal__day.mc-today::after {
      content: ''; position: absolute; bottom: 3px;
      width: 4px; height: 4px; border-radius: 50%; background: var(--blue);
    }
    .mini-cal__day.mc-active {
      background: var(--blue-grad) !important; color: #fff !important;
      font-weight: 700; box-shadow: 0 3px 10px var(--blue-glow);
    }
    .mini-cal__day.mc-active::after { display: none; }

    /* Selector año/mes (mini-cal YM picker) */
    .mc-ym-grid {
      max-height: 220px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: var(--bd) transparent;
    }
    .mc-ym-year {
      font-size: 11px; font-weight: 700; color: var(--t4);
      padding: 8px 4px 4px; border-bottom: 1px solid var(--bd);
      margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em;
    }
    .mc-ym-months {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px;
      margin-bottom: 8px;
    }
    .mc-ym-month {
      padding: 7px 2px; text-align: center; border-radius: 7px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      color: var(--t2); transition: background .12s, color .12s;
      font-family: inherit;
    }
    .mc-ym-month:not(.mc-ym-past):hover { background: var(--sur-2); color: var(--t1); }
    .mc-ym-month.mc-ym-active {
      background: var(--blue-grad); color: #fff; font-weight: 700;
      box-shadow: 0 2px 8px var(--blue-glow);
    }
    .mc-ym-month.mc-ym-past { color: var(--t4); cursor: default; }

    /* ── CANCHA TABS ────────────────────────────────────────── */
    .cancha-tabs {
      display: flex; gap: 6px; flex-wrap: nowrap;
      overflow-x: auto; padding-bottom: 4px; margin-top: 14px;
      scrollbar-width: none;
    }
    .cancha-tabs::-webkit-scrollbar { display: none; }

    .cancha-tab {
      flex-shrink: 0; white-space: nowrap;
      padding: 8px 16px; border-radius: 8px;
      background: var(--sur-0); border: 1px solid var(--bd);
      color: var(--t2); font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s, box-shadow .15s;
    }
    .cancha-tab:hover { background: var(--sur-1); border-color: var(--bd-hi); color: var(--t1); }
    .cancha-tab.active {
      background: var(--blue-grad); border-color: transparent; color: #fff;
      box-shadow: 0 3px 12px var(--blue-glow);
    }
    @media (max-width:520px) { .cancha-tab { padding: 7px 13px; font-size: 12px; } }

    /* ── INFO BAR ───────────────────────────────────────────── */
    .info-bar {
      display: flex; align-items: center; gap: 7px;
      background: var(--sur-0); border: 1px solid var(--bd);
      border-radius: 8px; padding: 9px 14px;
      font-size: 12px; color: var(--t2); font-weight: 500;
      margin-bottom: 12px;
    }
    .info-bar__dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .info-bar__sep { color: var(--t4); }
    @media (max-width:520px) { .info-bar { padding: 8px 12px; font-size: 11px; } }

    /* ── CANCHA HERO ─────────────────────────────────────────── */
    .cancha-hero {
      border-radius: 16px; overflow: hidden;
      position: relative; height: 176px;
      background: var(--sur-0); border: 1px solid var(--bd);
      margin-bottom: 14px;
    }
    .cancha-hero__img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .cancha-hero__gradient {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 58px;
    }
    .cancha-hero__overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 10px 16px 14px;
      background: linear-gradient(transparent, rgba(0,0,0,.8));
    }
    .cancha-hero__name {
      font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -.2px;
    }
    .cancha-hero__meta {
      font-size: 11px; color: rgba(255,255,255,.58); margin-top: 2px;
    }
    @media (max-width:520px) { .cancha-hero { height: 140px; border-radius: 12px; } }

    /* ── SLOT GRID ──────────────────────────────────────────── */
    .slot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
      gap: 7px;
    }
    @media (max-width:1060px) { .slot-grid { grid-template-columns: repeat(auto-fill, minmax(112px,1fr)); } }
    @media (max-width:520px)  { .slot-grid { grid-template-columns: repeat(3,1fr); gap: 6px; } }
    @media (max-width:360px)  { .slot-grid { grid-template-columns: repeat(2,1fr); } }

    .slot {
      border-radius: 10px;
      border: 1px solid var(--bd);
      border-left: 3px solid transparent;
      padding: 11px 12px;
      text-align: left;
      background: var(--sur-0);
      cursor: default;
      transition: background .15s, border-color .15s, transform .15s, box-shadow .15s;
    }
    @media (max-width:520px) { .slot { padding: 9px 10px; border-radius: 8px; } }

    .slot__time {
      font-size: 15px; font-weight: 800; color: var(--t1);
      line-height: 1; letter-spacing: -.5px;
      font-variant-numeric: tabular-nums;
    }
    @media (max-width:520px) { .slot__time { font-size: 14px; } }

<script>
'use strict';

/* ── SUPABASE ────────────────────────────────────────────── */
const SB_URL = 'https://ljsrakvyayjguwesmzoi.supabase.co';
const SB_KEY = 'sb_publishable_fJb0jH0ENWv8ux7MBr3EdA_k1Mlt9p-';

async function sbq(path, opts = {}) {
  const prefer = opts.method === 'POST' ? 'return=representation' : 'return=minimal';
  const r = await fetch(`${SB_URL}/rest/v1${path}`, {
    headers: {
      'apikey':        SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type':  'application/json',
      'Prefer':        prefer,
    },
    ...opts,
  });
  if (!r.ok) {
    const txt = await r.text();
    const err = new Error(`SB ${r.status}: ${txt}`);
    err.status = r.status;
    throw err;
  }
  const txt = await r.text();
  return txt ? JSON.parse(txt) : null;
}

/* ── ESTADO GLOBAL ───────────────────────────────────────── */
const S = {
  cliente:      null,
  config:       {},   // legacy, mantener para compat
  bs:           {},   // business_settings
  canchas:      [],
  fechaActual:  fechaHoy(),
  canchaActual: null,
  dniPendiente: '',
  calAno: null,
  calMes: null,
  calModoYM: false,
  feriados:  [],
};

/* ── HELPERS ─────────────────────────────────────────────── */
function fechaHoy() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2, '0'); }
function uid(p) { return p + '_' + Math.random().toString(36).slice(2,9) + Date.now().toString(36); }
function dniAId(dni) { return `cld${dni}`; }
function minutos(h) { const [hh,mm] = h.split(':').map(Number); return hh*60+mm; }
function sumar(h, min) { const t = minutos(h)+min; return `${pad(Math.floor(t/60))}:${pad(t%60)}`; }

const DIAS_CORTO = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const DIAS_LARGO = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES      = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MESES_FULL = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function infoFecha(str) {
  const [y,m,d] = str.split('-').map(Number);
  const o = new Date(y,m-1,d);
  return { dia: DIAS_CORTO[o.getDay()], num: d, mes: MESES[m-1] };
}
function fechaLarga(str) {
  const [y,m,d] = str.split('-').map(Number);
  const o = new Date(y,m-1,d);
  return `${DIAS_LARGO[o.getDay()]} ${d} de ${MESES_FULL[m-1]}`;
}
function fechaCorta(str) {
  const [y,m,d] = str.split('-').map(Number);
  const o = new Date(y,m-1,d);
  return `${DIAS_CORTO[o.getDay()]} ${d} ${MESES[m-1]}`;
}
function proxFechas(n=7) {
  const arr = [];
  for (let i=0; i<n; i++) {
    const d = new Date(); d.setDate(d.getDate()+i);
    arr.push(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);
  }
  return arr;
}

function deporteInfo(deporte='') {
  const d = deporte.toLowerCase();
  if (d.includes('fútbol')||d.includes('futbol')||d.includes('futsal'))
    return { emoji:'⚽', color:'#f59e0b', bg:'rgba(245,158,11,0.15)' };
  if (d.includes('pádel')||d.includes('padel'))
    return { emoji:'🏓', color:'#38bdf8', bg:'rgba(56,189,248,0.15)' };
  if (d.includes('tenis'))
    return { emoji:'🎾', color:'#38bdf8', bg:'rgba(56,189,248,0.15)' };
  if (d.includes('básquet')||d.includes('basquet'))
    return { emoji:'🏀', color:'#f97316', bg:'rgba(249,115,22,0.15)' };
  return { emoji:'🏟️', color:'#4a9eff', bg:'rgba(74,158,255,0.15)' };
}

/* ── TOAST ───────────────────────────────────────────────── */
function toast(msg, tipo='info', ms=3200) {
  const el = document.createElement('div');
  el.className = `toast toast--${tipo}`;
  el.textContent = msg;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(() => el.remove(), ms);
}

/* ── MODAL ───────────────────────────────────────────────── */
function abrirModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
}
function cerrarModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target.id === 'modalOverlay') cerrarModal();
});

function ir(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

/* ── VALIDACIONES ────────────────────────────────────────── */
function validarDNI(v) {
  const n = v.replace(/\D/g,'');
  if (!n.length) return 'Ingresá tu DNI.';
  if (n.length<7||n.length>8) return 'El DNI debe tener 7 u 8 dígitos.';
  return null;
}
function validarNombre(v) {
  const s = v.trim();
  if (s.length<5) return 'El nombre debe tener al menos 5 caracteres.';
  if (!/^[a-záéíóúüñA-ZÁÉÍÓÚÜÑ\s'.-]+$/.test(s)) return 'Solo se permiten letras.';
  return null;
}
function validarTelefono(v) {
  const n = v.replace(/\D/g,'');
  if (!/^\d{8,10}$/.test(n)) return 'El teléfono debe tener entre 8 y 10 dígitos (solo números).';
  return null;
}
function marcarError(inputId, errId, msg) {
  const inp = document.getElementById(inputId);
  const err = document.getElementById(errId);
  if (msg) { inp.classList.add('is-error'); err.textContent=msg; return false; }
  inp.classList.remove('is-error'); err.textContent=''; return true;
}

/* ══════════════════════════════════════════════════════════
   PANTALLA 1 — DNI
══════════════════════════════════════════════════════════ */
document.getElementById('inDNI').addEventListener('input', e => {
  e.target.value = e.target.value.replace(/\D/g,'');
});
document.getElementById('inDNI').addEventListener('keydown', e => {
  if (e.key==='Enter') document.getElementById('btnContinuar').click();
});

document.getElementById('btnContinuar').addEventListener('click', async () => {
  const dni = document.getElementById('inDNI').value.trim();
  if (!marcarError('inDNI','errDNI',validarDNI(dni))) return;
  const btn = document.getElementById('btnContinuar');
  btn.disabled=true; btn.textContent='Verificando…';
  try {
    const rows = await sbq(`/clientes?id=eq.${dniAId(dni)}`);
    if (rows?.length) {
      const c = rows[0];
      S.cliente = { id:c.id, nombre:c.nombre, telefono:c.telefono, dni };
      guardarSesion(); await entrar();
    } else {
      S.dniPendiente = dni;
      document.getElementById('regDNI').value = dni;
      ir('screen-registro');

/* ── MINI CALENDAR ───────────────────────────────────────── */
const MESES_CORTOS = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

function renderCalendar() {
  const wrap = document.getElementById('miniCal');
  if (!wrap) return;

  const hoy = fechaHoy();
  const [hy, hm] = hoy.split('-').map(Number);

  if (!S.calAno) { S.calAno = hy; S.calMes = hm; }

  // ── Modo selector de año/mes ──────────────────────────────
  if (S.calModoYM) {
    let html = '';
    for (let y = hy - 1; y <= hy + 5; y++) {
      const mHtml = MESES_CORTOS.map((mn, idx) => {
        const m = idx + 1;
        const isPast = (y < hy) || (y === hy && m < hm);
        const isActive = (y === S.calAno && m === S.calMes);
        let cls = 'mc-ym-month';
        if (isActive) cls += ' mc-ym-active';
        if (isPast)   cls += ' mc-ym-past';
        return `<div class="${cls}" data-y="${y}" data-m="${m}">${mn}</div>`;
      }).join('');
      html += `<div class="mc-ym-year">${y}</div><div class="mc-ym-months">${mHtml}</div>`;
    }
    wrap.innerHTML = `
      <div class="mini-cal__header">
        <button class="mini-cal__nav" id="calYMBack">‹</button>
        <span class="mini-cal__month-label">Seleccionar mes</span>
        <div style="width:28px"></div>
      </div>
      <div class="mc-ym-grid" id="calYMGrid">${html}</div>`;

    document.getElementById('calYMBack').addEventListener('click', () => {
      S.calModoYM = false; renderCalendar();
    });
    const grid = document.getElementById('calYMGrid');
    setTimeout(() => { const el = grid.querySelector('.mc-ym-active'); if (el) el.scrollIntoView({ block: 'center' }); }, 0);
    grid.addEventListener('click', e => {
      const cell = e.target.closest('.mc-ym-month');
      if (!cell || cell.classList.contains('mc-ym-past')) return;
      S.calAno = +cell.dataset.y; S.calMes = +cell.dataset.m;
      S.calModoYM = false; renderCalendar();
    });
    return;
  }

  // ── Modo normal (días) ────────────────────────────────────
  const ano = S.calAno, mes = S.calMes;

  const labelRaw = new Date(ano, mes - 1, 1)
    .toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });
  const label = labelRaw.charAt(0).toUpperCase() + labelRaw.slice(1);

  const firstWd  = new Date(ano, mes - 1, 1).getDay();
  const offset   = (firstWd + 6) % 7;
  const daysInMo = new Date(ano, mes, 0).getDate();
  const canPrev  = (ano > hy) || (ano === hy && mes > hm);
  const wdLabels = ['L','M','X','J','V','S','D'];

  let cellsHtml = '';
  for (let i = 0; i < offset; i++) {
    cellsHtml += `<div class="mini-cal__day mc-empty"></div>`;
  }
  for (let d = 1; d <= daysInMo; d++) {
    const fStr    = `${ano}-${pad(mes)}-${pad(d)}`;
    const isPast    = fStr < hoy;
    const isToday   = fStr === hoy;
    const isActive  = fStr === S.fechaActual;
    const isFeriado = S.feriados.some(f => f.fecha === fStr);
    let cls = 'mini-cal__day';
    if      (isActive)  cls += ' mc-active';
    else if (isPast)    cls += ' mc-past';
    else if (isFeriado) cls += ' mc-feriado';
    else if (isToday)   cls += ' mc-today';
    cellsHtml += `<div class="${cls}" data-fecha="${fStr}">${d}</div>`;
  }

  wrap.innerHTML = `
    <div class="mini-cal__header">
      <button class="mini-cal__nav" id="calPrev" ${canPrev ? '' : 'disabled'}>‹</button>
      <button class="mini-cal__month-btn" id="calMonthBtn">${label} <span class="mc-arrow">▾</span></button>
      <button class="mini-cal__nav" id="calNext">›</button>
    </div>
    <div class="mini-cal__weekdays">
      ${wdLabels.map(w => `<div class="mini-cal__wd">${w}</div>`).join('')}
    </div>
    <div class="mini-cal__days" id="calDays">${cellsHtml}</div>`;

  document.getElementById('calMonthBtn').addEventListener('click', () => {
    S.calModoYM = true; renderCalendar();
  });
  document.getElementById('calPrev').addEventListener('click', () => {
    if (!canPrev) return;
    S.calMes--;
    if (S.calMes < 1) { S.calMes = 12; S.calAno--; }
    renderCalendar();
  });
  document.getElementById('calNext').addEventListener('click', () => {
    S.calMes++;
    if (S.calMes > 12) { S.calMes = 1; S.calAno++; }
    renderCalendar();
  });
  document.getElementById('calDays').addEventListener('click', async e => {
    const cell = e.target.closest('.mini-cal__day');
    if (!cell || cell.classList.contains('mc-past') || cell.classList.contains('mc-empty')) return;
    const f = cell.dataset.fecha;
    if (!f || f < fechaHoy()) return;
    S.fechaActual = f;
    renderCalendar();
    await renderSlots();
  });
}

/* ── SLOT GRID ───────────────────────────────────────────── */
async function renderSlots() {
  const grid = document.getElementById('slotGrid');
  grid.innerHTML = '<div class="spinner" style="grid-column:1/-1"></div>';

  const cancha = S.canchas.find(c => c.id === S.canchaActual);
  if (!cancha) { grid.innerHTML=''; return; }

  // ¿Día feriado?
  const feriado = S.feriados.find(f => f.fecha === S.fechaActual);
  if (feriado) {
    grid.innerHTML = `<div class="slot-feriado">
      <div class="slot-feriado__icon">🗓️</div>
      <div class="slot-feriado__title">${feriado.motivo || 'Cerrado'}</div>
      <div class="slot-feriado__sub">No hay turnos disponibles para este día.</div>
    </div>`;
    return;
  }

  const turnosDB = await sbq(
    `/turnos?canchaId=eq.${cancha.id}&fecha=eq.${S.fechaActual}&order=horaInicio`
  ) || [];

  const misReservasDB = S.cliente
    ? await sbq(`/reservas?clienteId=eq.${S.cliente.id}`) || [] : [];
  const misTurnoIds = new Set(misReservasDB.map(r=>r.turnoId));

  const slotsCalc = calcularSlots(cancha);
  const esHoy     = S.fechaActual === fechaHoy();
  const ahoraMin  = minutos(`${pad(new Date().getHours())}:${pad(new Date().getMinutes())}`);

  grid.innerHTML = '';

  if (!slotsCalc.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--t3);font-size:13px">No hay turnos configurados para este día.</div>';
    return;
  }

  slotsCalc.forEach(slot => {
    const turnoExistente = turnosDB.find(t => t.horaInicio===slot.horaInicio);
    const esMio   = turnoExistente && misTurnoIds.has(turnoExistente.id);
    const ocupado = turnoExistente && !esMio;
    const pasado  = esHoy && minutos(slot.horaInicio) <= ahoraMin;
    const libre   = !ocupado && !pasado && !esMio;

    let cls = 'slot ';
    if      (pasado)  cls += 'slot--pasado';
    else if (esMio)   cls += 'slot--mia';
    else if (ocupado) cls += 'slot--ocupado';
    else              cls += 'slot--libre';

    const div = document.createElement('div');
    div.className = cls;
    div.innerHTML = `
      <div class="slot__time">${slot.horaInicio}</div>
      <div class="slot__dur">${cancha.duracionTurno} min</div>
      <div class="slot__price">
        ${esMio   ? '✓ Mi reserva' :
          ocupado ? 'Ocupado'      :
          pasado  ? ''             :
          `$${cancha.precio.toLocaleString('es-AR')}`}
      </div>`;
    if (libre) div.addEventListener('click', () => pedirConfirmacion(slot, turnoExistente, cancha));
    grid.appendChild(div);
  });
}

function calcularSlots(cancha) {
  const apertura = S.bs.openingTime || S.config.horaApertura || '08:00';
  const cierre   = S.bs.closingTime || S.config.horaCierre   || '22:00';
  const slots = []; let h = apertura;
  while (minutos(h) + cancha.duracionTurno <= minutos(cierre)) {
    slots.push({ horaInicio:h, horaFin:sumar(h,cancha.duracionTurno) });
    h = sumar(h, cancha.duracionTurno);
  }
  return slots;
}

    <div class="modal__sub">${cancha.deporte} · ${cancha.duracionTurno} min</div>

      </div>
      <div class="modal-detail-row">
        <span class="modal-detail-row__icon">🕐</span>
        <span class="modal-detail-row__label">Horario</span>
        <span class="modal-detail-row__val">${slot.horaInicio} – ${slot.horaFin}</span>
      </div>
      <div class="modal-detail-row">
        <span class="modal-detail-row__icon">💰</span>
        <span class="modal-detail-row__label">Precio</span>

      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn--success btn--full" id="btnConfirmarReserva">Confirmar reserva</button>
      <button class="btn btn--ghost btn--full" onclick="cerrarModal()">Cancelar</button>
    </div>
  `);
  document.getElementById('btnConfirmarReserva').onclick =

async function hacerReserva(slot, turnoExistente, cancha) {
  const btnConfirmar = document.getElementById('btnConfirmarReserva');
  if (btnConfirmar) { btnConfirmar.disabled=true; btnConfirmar.textContent='Procesando…'; }

  try {
    // ── Validar reglas de reserva ──────────────────────────────────────
    const bs = S.bs;

    // max_days_in_advance
    const hoyMs    = new Date(fechaHoy()).getTime();
    const fechaMs  = new Date(S.fechaActual).getTime();
    const diffDias = Math.round((fechaMs - hoyMs) / 86400000);
    if (diffDias > bs.maxDaysInAdvance) {
      cerrarModal();
      toast(`Solo podés reservar con ${bs.maxDaysInAdvance} días de anticipación.`, 'error');
      return;
    }

    // max_active_bookings y max_bookings_per_day
    const misReservas = await sbq(`/reservas?clienteId=eq.${S.cliente.id}`) || [];
    if (misReservas.length) {
      const ids = misReservas.map(r => r.turnoId).join(',');
      const activos = await sbq(
        `/turnos?id=in.(${ids})&estado=in.(reservado,pendiente,pagado)&fecha=gte.${fechaHoy()}`
      ) || [];

      if (activos.length >= bs.maxActiveBookings) {
        cerrarModal();
        toast(`Tenés el máximo de ${bs.maxActiveBookings} reservas activas permitidas.`, 'error');
        return;
      }
      const delDia = activos.filter(t => t.fecha === S.fechaActual);
      if (delDia.length >= bs.maxBookingsPerDay) {
        cerrarModal();
        toast(`Ya tenés ${bs.maxBookingsPerDay} reservas para este día.`, 'error');
        return;
      }

      // max_consecutive_hours — verificar que el nuevo slot no genere un bloque > límite
      const delDiaConNuevo = [
        ...delDia.map(t => ({ s: minutos(t.horaInicio), e: minutos(t.horaFin) })),
        { s: minutos(slot.horaInicio), e: minutos(slot.horaFin) },
      ].sort((a, b) => a.s - b.s);
      let maxBloque = 0, cs = null, ce = null;
      for (const seg of delDiaConNuevo) {
        if (ce === null || seg.s > ce) { cs = seg.s; ce = seg.e; }
        else { ce = Math.max(ce, seg.e); }
        maxBloque = Math.max(maxBloque, ce - cs);
      }
      if (maxBloque > bs.maxConsecutiveHours * 60) {
        cerrarModal();
        toast(`No podés reservar más de ${bs.maxConsecutiveHours} horas seguidas.`, 'error');
        return;
      }
    }

    // ── Siempre INSERT — el índice único en DB (canchaId, fecha, horaInicio) rechaza dobles reservas
    const nuevoTurno = {
      id: uid('t'), canchaId: cancha.id, fecha: S.fechaActual,
      horaInicio: slot.horaInicio, horaFin: slot.horaFin, estado: 'reservado',
    };
    const created = await sbq('/turnos', { method: 'POST', body: JSON.stringify(nuevoTurno) });
    const turnoId = (Array.isArray(created) ? created[0] : created)?.id || nuevoTurno.id;

    await sbq('/reservas', { method: 'POST', body: JSON.stringify({ id: uid('r'), clienteId: S.cliente.id, turnoId }) });

    abrirModal(`
      <div class="modal-success">
        <div class="modal-success__circle">✓</div>
        <div class="modal-success__title">¡Reserva confirmada!</div>
        <div class="modal-success__sub">${cancha.nombre} · ${slot.horaInicio} – ${slot.horaFin}<br>${fechaLarga(S.fechaActual)}</div>
        <button class="btn btn--confirm-back btn--full" onclick="cerrarModal()">Volver</button>
      </div>
    `);
    await Promise.all([renderSlots(), renderMisReservas()]);
  } catch(e) {
    cerrarModal();
    if (e.status === 409) {
      toast('Este turno acaba de ser reservado por otra persona 😕', 'error');
    } else {
      toast('Error al reservar. Intentá de nuevo.', 'error');
      console.error(e);
    }
    await renderSlots();
  }
}

/* ── MIS RESERVAS ────────────────────────────────────────── */
async function renderMisReservas() {
  const wrap = document.getElementById('misReservas');
  wrap.innerHTML = '<div class="spinner"></div>';

  try {
    const hoyStr  = fechaHoy();
    const reservas = await sbq(`/reservas?clienteId=eq.${S.cliente.id}`) || [];

    if (!reservas.length) {
      wrap.innerHTML = '<div class="empty-reservas">No tenés reservas activas.</div>';
      actualizarBadge(0); return;
    }

    const ids    = reservas.map(r=>r.turnoId).join(',');
    const turnos = await sbq(`/turnos?id=in.(${ids})&fecha=gte.${hoyStr}&estado=in.(reservado,pendiente,pagado)&order=fecha,horaInicio`) || [];

    if (!turnos.length) {
      wrap.innerHTML = '<div class="empty-reservas">No tenés reservas activas.</div>';
      actualizarBadge(0); return;
    }

    const canchaIds = [...new Set(turnos.map(t=>t.canchaId))].join(',');
    const canchas   = await sbq(`/canchas?id=in.(${canchaIds})`) || [];

    wrap.innerHTML = '';
    turnos.forEach(turno => {
      const cancha  = canchas.find(c=>c.id===turno.canchaId);
      const reserva = reservas.find(r=>r.turnoId===turno.id);
      if (!cancha||!reserva) return;

      const esHoyTurno = turno.fecha === hoyStr;
      const info       = deporteInfo(cancha.deporte);
      const estadoBadge = turno.estado==='pendiente'
        ? '<span class="reserva-card__badge badge--pendiente">Pendiente</span>'
        : '<span class="reserva-card__badge badge--confirmada">Confirmada</span>';

      const card = document.createElement('div');
      card.className = 'reserva-card';
      card.innerHTML = `
        <div class="reserva-card__icon" style="background:${info.bg}">${info.emoji}</div>
        <div class="reserva-card__main">
          <div class="reserva-card__court">${cancha.nombre}</div>
          <div class="reserva-card__time">
            ${esHoyTurno?'<strong style="color:var(--pending)">Hoy</strong>':fechaCorta(turno.fecha)}
            · ${turno.horaInicio} – ${turno.horaFin}
          </div>
        </div>
        <div class="reserva-card__right">
          <div class="reserva-card__price">$${cancha.precio.toLocaleString('es-AR')}</div>
          ${estadoBadge}
        </div>
        <button class="btn--danger-soft"
          data-rid="${reserva.id}" data-tid="${turno.id}"
          data-cancha="${cancha.nombre}" data-fecha="${turno.fecha}"
          data-inicio="${turno.horaInicio}" data-fin="${turno.horaFin}">
          Cancelar
        </button>`;
      wrap.appendChild(card);
    });

    if (!wrap.children.length) {
      wrap.innerHTML = '<div class="empty-reservas">No tenés reservas activas.</div>';
      actualizarBadge(0);
    } else {
      actualizarBadge(wrap.children.length);
      wrap.querySelectorAll('[data-rid]').forEach(btn => {
        btn.addEventListener('click', () => pedirCancelacion(
          btn.dataset.rid, btn.dataset.tid, btn.dataset.cancha,
          btn.dataset.fecha, btn.dataset.inicio, btn.dataset.fin
        ));
      });
    }
  } catch(e) {
    wrap.innerHTML = '<div class="empty-reservas">Error al cargar reservas.</div>';
    console.error(e);
  }
}

function actualizarBadge(n) {
  document.getElementById('accordionBadge').textContent = n;
}

/* ── CANCELAR ────────────────────────────────────────────── */
function pedirCancelacion(rid, tid, cancha, fecha, inicio, fin) {
  abrirModal(`
    <div class="modal__label">Cancelar reserva</div>
    <div class="modal__title">¿Estás seguro?</div>
    <div class="modal__sub">Esta acción no se puede deshacer.</div>
    <div class="modal-detail-rows">
      <div class="modal-detail-row">
        <span class="modal-detail-row__icon">🏟️</span>
        <span class="modal-detail-row__label">Cancha</span>
        <span class="modal-detail-row__val">${cancha}</span>
      </div>
      <div class="modal-detail-row">
        <span class="modal-detail-row__icon">📅</span>
        <span class="modal-detail-row__label">Fecha</span>
        <span class="modal-detail-row__val">${fechaLarga(fecha)}</span>
      </div>
      <div class="modal-detail-row">
        <span class="modal-detail-row__icon">🕐</span>
        <span class="modal-detail-row__label">Horario</span>
        <span class="modal-detail-row__val">${inicio} – ${fin}</span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn--danger-soft btn--full" id="btnEjecutarCancel" style="padding:12px;font-size:14px;border-radius:10px">
        Cancelar turno
      </button>
      <button class="btn btn--ghost btn--full" onclick="cerrarModal()">Volver</button>
    </div>
  `);
  document.getElementById('btnEjecutarCancel').onclick =
    () => ejecutarCancelacion(rid, tid);
}

async function ejecutarCancelacion(rid, tid) {
  cerrarModal();
  try {
    // Eliminar reserva y turno (el slot vuelve a estar disponible implícitamente)
    await sbq(`/reservas?id=eq.${rid}`, { method: 'DELETE' });
    await sbq(`/turnos?id=eq.${tid}`,   { method: 'DELETE' });
    toast('Reserva cancelada.', 'info');
    await Promise.all([renderSlots(), renderMisReservas()]);
  } catch(e) {
    toast('Error al cancelar. Intentá de nuevo.', 'error');
    console.error(e);
  }
}

/* ── SALIR ───────────────────────────────────────────────── */
document.getElementById('btnSalir').addEventListener('click', () => {
  abrirModal(`
    <div class="modal__label">Sesión</div>
    <div class="modal__title">Cerrar sesión</div>
    <div class="modal__sub">La próxima vez vas a tener que ingresar tu DNI.</div>
    <div class="modal-actions">
      <button class="btn btn--danger-soft btn--full" id="btnConfirmarSalir" style="padding:12px;font-size:14px;border-radius:10px">
        Salir
      </button>
      <button class="btn btn--ghost btn--full" onclick="cerrarModal()">Quedarme</button>
    </div>
  `);
  document.getElementById('btnConfirmarSalir').onclick = () => {
    borrarSesion(); S.cliente=null;
    cerrarModal(); ir('screen-dni');
    document.getElementById('inDNI').value='';
  };
});

/* ══════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════ */
async function init() {
  // Cargar business_settings (fuente de verdad) con fallback a config legacy
  try {
    const [bsRows, cfgRows, feriadosRows] = await Promise.all([
      sbq('/business_settings'),
      sbq('/config').catch(() => []),
      sbq('/feriados?order=fecha').catch(() => []),
    ]);
    S.feriados = feriadosRows || [];
    const bs  = bsRows?.[0]  || {};
    const cfg = cfgRows?.[0] || {};

    S.bs = {
      name:                bs.name            || cfg.nombreComplejo || cfg.nombre || 'Reservas',
      description:         bs.description     || cfg.subtitulo      || '',
      address:             bs.address         || cfg.direccion      || '',
      googleMapsUrl:       bs.google_maps_url || cfg.googleMaps     || '',
      whatsapp:            bs.whatsapp        || '',
      phone:               bs.phone           || '',
      logoUrl:             bs.logo_url        || '',
      primaryColor:        bs.primary_color   || '#2f81f7',
      secondaryColor:      bs.secondary_color || '#ffffff',
      openingTime:         bs.opening_time    || cfg.horaApertura   || '08:00',
      closingTime:         bs.closing_time    || cfg.horaCierre     || '22:00',
      maxBookingsPerDay:   bs.max_bookings_per_day  ?? 2,
      maxActiveBookings:   bs.max_active_bookings   ?? 3,
      maxDaysInAdvance:    bs.max_days_in_advance   ?? 7,
      maxConsecutiveHours: bs.max_consecutive_hours ?? 2,
    };
    // Compat legacy
    S.config = { nombre: S.bs.name, horaApertura: S.bs.openingTime, horaCierre: S.bs.closingTime };
  } catch(e) { console.warn('Config no disponible.', e); }

  aplicarBrandingPublico();

  const saved = localStorage.getItem('rv_cliente');
  if (saved) {
    try {
      const c = JSON.parse(saved);
      const rows = await sbq(`/clientes?id=eq.${c.id}`);
      if (rows?.length) {
        S.cliente = { ...c, nombre:rows[0].nombre, telefono:rows[0].telefono };
        guardarSesion();
        document.getElementById('loadingFull').classList.add('oculto');
        await entrar(); return;
      }
    } catch { /* sesión inválida */ }
    borrarSesion();
  }

  document.getElementById('loadingFull').classList.add('oculto');
  ir('screen-dni');
  setTimeout(() => document.getElementById('inDNI').focus(), 100);
}

/** Aplica branding de business_settings al frontend público. */
function aplicarBrandingPublico() {
  const bs = S.bs;
  const nombre = bs.name || 'Reservas';

  // Nombre en pantallas de auth y header
  ['nameA','nameB'].forEach(id => {
    const el = document.getElementById(id); if (el) el.textContent = nombre;
  });
  const hComplex = document.getElementById('hComplex'); if (hComplex) hComplex.textContent = nombre;
  document.title = `Reservar · ${nombre}`;

  // Logo
  if (bs.logoUrl) {
    ['logoA','logoB'].forEach(id => {
      const el = document.getElementById(id); if (!el) return;
      el.innerHTML = `<img src="${bs.logoUrl}" alt="${nombre}" style="width:68px;height:68px;object-fit:cover;border-radius:12px">`;
    });
    const hLogo = document.getElementById('hLogo');
    if (hLogo) hLogo.innerHTML = `<img src="${bs.logoUrl}" alt="${nombre}" style="width:36px;height:36px;object-fit:cover;border-radius:8px">`;
    const loadIcon = document.getElementById('loadIcon');
    if (loadIcon) loadIcon.innerHTML = `<img src="${bs.logoUrl}" alt="${nombre}" style="width:80px;height:80px;object-fit:cover;border-radius:16px">`;
  }

  // Helper para derivar variantes con opacidad
  function _rgba(hex, a) {
    const h = hex.replace('#', '');
    const [r, g, b] = [0, 2, 4].map(i => parseInt(h.slice(i, i + 2), 16));
    return `rgba(${r},${g},${b},${a})`;
  }

  // Color principal
  if (bs.primaryColor) {
    document.documentElement.style.setProperty('--accent',       bs.primaryColor);
    document.documentElement.style.setProperty('--accent-muted', _rgba(bs.primaryColor, 0.13));
  }

  // Color secundario
  const sec = bs.secondaryColor || '#6b7280';
  document.documentElement.style.setProperty('--secondary',        sec);
  document.documentElement.style.setProperty('--secondary-muted',  _rgba(sec, 0.15));
  document.documentElement.style.setProperty('--secondary-border', _rgba(sec, 0.30));

  // Footer — dirección y WhatsApp
  renderLocation();
}

init();

/* ── REFRESCO AUTOMÁTICO ─────────────────────────────────── */
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState==='visible' && S.cliente)
    Promise.all([renderSlots(), renderMisReservas()]);
});
setInterval(() => {
  if (!document.hidden && S.cliente)
    Promise.all([renderSlots(), renderMisReservas()]);
}, 30_000);
</script>
