<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Reservar turno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #060c1a;
      --surface:     #0d1528;
      --surfaceHov:  #111d38;
      --cardBorder:  rgba(255,255,255,0.07);
      --headerBg:    rgba(6,12,26,0.92);
      --accent:      #4a9eff;
      --accentGrad:  linear-gradient(135deg,#2979d6,#5ab4ff);
      --accentGlow:  rgba(74,158,255,0.3);
      --available:   #00c97a;
      --availBg:     rgba(0,201,122,0.12);
      --availBorder: rgba(0,201,122,0.3);
      --pending:     #f59e0b;
      --danger:      rgba(255,60,60,0.85);
      --text:        #f0f4ff;
      --textMuted:   rgba(200,215,255,0.5);
      --textSub:     rgba(200,215,255,0.35);
      --reservaCard: linear-gradient(135deg,rgba(41,121,214,0.18),rgba(90,180,255,0.08));
      --reservaBorder: rgba(74,158,255,0.2);
    }

    html, body {
      min-height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px; line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    /* ── PANTALLAS ──────────────────────────────────────────────── */
    .screen { display: none; min-height: 100vh; flex-direction: column; }
    .screen.active { display: flex; }

    /* ══════════════════════════════════════════════════════════════
       AUTH — DNI / REGISTRO
    ══════════════════════════════════════════════════════════════ */
    .auth-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 20px; gap: 32px;
    }

    .auth-logo { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .auth-logo__icon {
      width: 72px; height: 72px; border-radius: 22px;
      background: var(--accentGrad);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; box-shadow: 0 12px 40px var(--accentGlow);
    }
    .auth-logo__name { font-size: 22px; font-weight: 800; color: var(--text); }
    .auth-logo__sub  { font-size: 13px; color: var(--textMuted); }

    .auth-card {
      width: 100%; max-width: 400px;
      background: var(--surface); border: 1px solid var(--cardBorder);
      border-radius: 20px; padding: 28px;
    }
    .auth-card__title { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .auth-card__sub   { font-size: 13px; color: var(--textMuted); margin-bottom: 24px; }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 11px; font-weight: 700;
      color: var(--textMuted); text-transform: uppercase;
      letter-spacing: .5px; margin-bottom: 8px;
    }
    .form-group input {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid var(--cardBorder); border-radius: 10px;
      padding: 12px 16px; font: 500 15px 'Inter', sans-serif;
      color: var(--text); transition: border-color .15s, box-shadow .15s;
    }
    .form-group input:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(74,158,255,.15);
    }
    .form-group input::placeholder { color: var(--textSub); }
    .form-group input:disabled     { opacity: .4; cursor: not-allowed; }
    .form-group input.is-error     { border-color: rgba(255,80,80,.5); }
    .field-err { font-size: 11px; color: rgba(255,100,100,.9); margin-top: 5px; min-height: 16px; }

    /* ── BOTONES ────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 12px 20px; border: 1px solid transparent; border-radius: 10px;
      font: 700 14px 'Inter', sans-serif; cursor: pointer;
      transition: all .18s; white-space: nowrap; text-align: center;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; pointer-events: none; }
    .btn--full    { width: 100%; }
    .btn--primary {
      background: var(--accentGrad); color: #fff; border: none;
      box-shadow: 0 4px 20px var(--accentGlow);
    }
    .btn--primary:hover { filter: brightness(1.1); }
    .btn--success {
      background: var(--accentGrad); color: #fff; border: none;
      box-shadow: 0 4px 20px var(--accentGlow);
      padding: 14px; font-size: 15px; border-radius: 12px;
    }
    .btn--success:hover { filter: brightness(1.08); }
    .btn--ghost {
      background: rgba(255,255,255,0.05);
      border-color: var(--cardBorder); color: var(--textMuted);
      border-radius: 10px;
    }
    .btn--ghost:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .btn--danger-soft {
      background: rgba(255,60,60,0.1); border: 1px solid rgba(255,60,60,0.2);
      color: rgba(255,100,100,.85); border-radius: 8px;
      padding: 6px 12px; font-size: 12px; font-weight: 600;
    }
    .btn--danger-soft:hover { background: rgba(255,60,60,0.18); }
    .btn--confirm-back {
      background: var(--availBg); border: 1px solid var(--availBorder);
      color: var(--available); border-radius: 10px; padding: 13px; font-size: 14px;
    }
    .btn--confirm-back:hover { background: rgba(0,201,122,.2); }

    .back-btn {
      background: none; border: none; color: var(--textMuted);
      font: 600 13px 'Inter', sans-serif; cursor: pointer;
      padding: 0; margin-bottom: 20px;
      display: flex; align-items: center; gap: 5px;
    }
    .back-btn:hover { color: var(--text); }

    /* ══════════════════════════════════════════════════════════════
       HEADER PRINCIPAL
    ══════════════════════════════════════════════════════════════ */
    .main-header {
      height: 60px;
      background: var(--headerBg);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 0 20px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 100;
    }
    @media (max-width:520px) { .main-header { height: 48px; padding: 0 14px; } }

    .main-header__logo {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--accentGrad);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .main-header__info { flex: 1; min-width: 0; }
    .main-header__complex {
      font-size: 14px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .main-header__user {
      font-size: 11px; color: var(--textMuted);
    }
    .main-header__user span { color: var(--accent); font-weight: 600; }

    .btn--salir {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      color: var(--textMuted); border-radius: 8px;
      padding: 6px 16px; font: 500 13px 'Inter', sans-serif;
      cursor: pointer; transition: all .15s; flex-shrink: 0;
    }
    .btn--salir:hover { background: rgba(255,255,255,.1); color: var(--text); }

    /* ══════════════════════════════════════════════════════════════
       CONTENIDO PRINCIPAL
    ══════════════════════════════════════════════════════════════ */
    .main-content {
      flex: 1; padding: 32px 20px 60px;
      max-width: 860px; margin: 0 auto; width: 100%;
      display: flex; flex-direction: column; gap: 36px;
    }
    @media (max-width:520px) { .main-content { padding: 20px 14px 48px; gap: 24px; } }

    /* ══════════════════════════════════════════════════════════════
       ACCORDION MIS RESERVAS
    ══════════════════════════════════════════════════════════════ */
    .accordion-trigger {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      background: none; border: none; border-bottom: 1px solid rgba(255,255,255,0.07);
      padding-bottom: 12px; cursor: pointer;
      transition: border-color .2s;
    }
    .accordion-trigger.open {
      border-bottom-color: rgba(74,158,255,0.2);
    }
    .accordion-trigger__left { display: flex; align-items: center; gap: 10px; }
    .accordion-trigger__label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--textSub);
    }
    .accordion-badge {
      width: 18px; height: 18px; border-radius: 99px;
      background: var(--accentGrad); color: #fff;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .accordion-arrow {
      color: var(--accent); font-size: 16px;
      transition: transform .25s ease; display: inline-block;
    }
    .accordion-trigger.open .accordion-arrow { transform: rotate(180deg); }

    .accordion-body { overflow: hidden; transition: max-height .3s ease; }
    .accordion-body.open { max-height: 1000px; }
    .accordion-body.closed { max-height: 0; }

    /* ── TARJETA RESERVA ────────────────────────────────────────── */
    .reserva-card {
      background: var(--reservaCard);
      border: 1px solid var(--reservaBorder);
      border-radius: 14px; padding: 14px 16px;
      display: flex; align-items: center; gap: 16px;
      margin-top: 10px;
    }
    .reserva-card__icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .reserva-card__main { flex: 1; min-width: 0; }
    .reserva-card__court { font-size: 15px; font-weight: 700; color: var(--text); }
    .reserva-card__time  {
      font-size: 12px; color: var(--textMuted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px;
    }
    .reserva-card__right { text-align: right; flex-shrink: 0; }
    .reserva-card__price { font-size: 14px; font-weight: 700; color: var(--accent); }
    .reserva-card__badge {
      display: inline-block; margin-top: 4px;
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      padding: 2px 8px; border-radius: 99px;
    }
    .badge--confirmada { color: var(--available); background: var(--availBg); }
    .badge--pendiente  { color: var(--pending);   background: rgba(245,158,11,0.12); }

    @media (max-width:520px) {
      .reserva-card { flex-wrap: wrap; gap: 10px; }
      .reserva-card__icon { width: 32px; height: 32px; font-size: 15px; border-radius: 8px; }
      .reserva-card__court { font-size: 14px; }
      .reserva-card__time  { font-size: 11px; }
      .reserva-card__right { flex: 0 0 auto; }
    }

    .empty-reservas {
      margin-top: 12px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--cardBorder);
      border-radius: 14px; padding: 28px 20px;
      text-align: center; color: var(--textSub); font-size: 14px;
    }

    /* ══════════════════════════════════════════════════════════════
       RESERVAR TURNO — SECCIÓN
    ══════════════════════════════════════════════════════════════ */
    .section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .1em; color: var(--textSub);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding-bottom: 12px; margin-bottom: 16px;
    }

    /* ── DATE TABS ──────────────────────────────────────────────── */
    .date-tabs {
      display: flex; gap: 8px;
      overflow-x: auto; padding-bottom: 4px; scrollbar-width: none;
    }
    .date-tabs::-webkit-scrollbar { display: none; }

    .date-tab {
      flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
      min-width: 64px; padding: 10px 8px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--cardBorder);
      border-radius: 12px; cursor: pointer; transition: all .15s;
      position: relative;
    }
    @media (max-width:520px) { .date-tab { min-width: 52px; padding: 8px 4px; border-radius: 10px; } }

    .date-tab:hover { border-color: rgba(74,158,255,.3); }
    .date-tab.active {
      background: var(--accentGrad); border-color: transparent;
      box-shadow: 0 4px 16px var(--accentGlow);
    }

    .date-tab__day {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      color: var(--textMuted);
    }
    .date-tab.active .date-tab__day { color: rgba(255,255,255,.8); }

    .date-tab__num {
      font-size: 22px; font-weight: 800; color: var(--text); line-height: 1.1;
    }
    @media (max-width:520px) { .date-tab__num { font-size: 18px; } }
    .date-tab.active .date-tab__num { color: #fff; }

    .date-tab__mes {
      font-size: 10px; color: var(--textSub);
    }
    .date-tab.active .date-tab__mes { color: rgba(255,255,255,.7); }

    .date-tab__dot {
      width: 4px; height: 4px; border-radius: 50%; margin-top: 4px;
      background: var(--accent);
    }
    .date-tab.active .date-tab__dot { background: #fff; }

    /* ── CANCHA TABS ────────────────────────────────────────────── */
    .cancha-tabs {
      display: flex; gap: 6px; flex-wrap: nowrap;
      overflow-x: auto; padding-bottom: 4px; margin-top: 14px;
      scrollbar-width: none;
    }
    .cancha-tabs::-webkit-scrollbar { display: none; }

    .cancha-tab {
      flex-shrink: 0; white-space: nowrap;
      padding: 8px 18px; border-radius: 99px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--cardBorder);
      color: var(--textMuted); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    @media (max-width:520px) { .cancha-tab { padding: 7px 14px; font-size: 12px; } }
    .cancha-tab:hover { border-color: rgba(74,158,255,.3); color: var(--text); }
    .cancha-tab.active {
      background: var(--accentGrad); border-color: transparent; color: #fff;
      box-shadow: 0 4px 14px var(--accentGlow);
    }

    /* ── INFO BAR ───────────────────────────────────────────────── */
    .info-bar {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.02); border: 1px solid var(--cardBorder);
      border-radius: 10px; padding: 10px 16px; margin-top: 14px;
      font-size: 13px; color: var(--textMuted);
    }
    @media (max-width:520px) { .info-bar { padding: 8px 12px; font-size: 11px; } }
    .info-bar__dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .info-bar__sep { color: var(--textSub); }

    /* ── SLOT GRID ──────────────────────────────────────────────── */
    .slot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px; margin-top: 14px;
    }
    @media (max-width:520px) {
      .slot-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    }
    @media (max-width:360px) {
      .slot-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .slot {
      border-radius: 12px; border: 1px solid var(--cardBorder);
      padding: 14px 16px; text-align: center; transition: all .2s ease;
      background: rgba(255,255,255,0.03);
    }
    @media (max-width:520px) { .slot { padding: 10px 8px; border-radius: 10px; } }

    .slot__time {
      font-size: 22px; font-weight: 700; color: var(--text); line-height: 1;
    }
    @media (max-width:520px) { .slot__time { font-size: 17px; } }

    .slot__dur  { font-size: 11px; color: var(--textMuted); margin-top: 4px; }
    @media (max-width:520px) { .slot__dur { display: none; } }

    .slot__price { font-size: 13px; font-weight: 600; margin-top: 6px; }
    @media (max-width:520px) { .slot__price { font-size: 11px; margin-top: 4px; } }

    .slot--libre {
      background: var(--availBg); border-color: var(--availBorder); cursor: pointer;
    }
    .slot--libre .slot__time  { color: var(--text); }
    .slot--libre .slot__price { color: var(--available); }
    .slot--libre:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
    }
    .slot--libre:hover .slot__time { color: var(--available); }

    .slot--mia {
      background: rgba(74,158,255,.1); border-color: rgba(74,158,255,.3);
    }
    .slot--mia .slot__time  { color: var(--accent); }
    .slot--mia .slot__price { color: var(--accent); font-size: 11px; }

    .slot--ocupado { opacity: .4; cursor: not-allowed; }
    .slot--ocupado .slot__time { color: rgba(255,255,255,.3); }

    .slot--pasado  { opacity: .25; cursor: not-allowed; }

    /* ── LEYENDA ────────────────────────────────────────────────── */
    .legend {
      display: flex; gap: 16px; margin-top: 20px; flex-wrap: wrap;
    }
    .legend__item {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--textSub);
    }
    @media (max-width:520px) { .legend__item { font-size: 11px; } }
    .legend__dot {
      width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0;
    }

    /* ══════════════════════════════════════════════════════════════
       MODAL (bottom sheet mobile / centrado desktop)
    ══════════════════════════════════════════════════════════════ */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(8px);
      z-index: 500; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.active { display: flex; }
    @media (min-width:521px) { .modal-overlay { align-items: center; padding: 20px; } }

    .modal {
      background: var(--surface); border: 1px solid var(--cardBorder);
      border-radius: 20px 20px 0 0;
      padding: 10px 22px 36px; width: 100%; max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,.7);
      animation: slideUp .22s ease;
    }
    @media (min-width:521px) {
      .modal { border-radius: 24px; padding: 32px; animation: fadeIn .18s ease; }
    }

    @keyframes slideUp { from { transform:translateY(30px); opacity:0; } to { transform:translateY(0); opacity:1; } }
    @keyframes fadeIn  { from { opacity:0; transform:scale(.97); } to { opacity:1; transform:scale(1); } }

    .modal__handle {
      width: 40px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,.15);
      margin: 0 auto 20px; display: block;
    }
    @media (min-width:521px) { .modal__handle { display: none; } }

    /* Modal normal (cancelar / salir) */
    .modal__label {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--accent); margin-bottom: 8px;
    }
    .modal__title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
    .modal__sub   { font-size: 13px; color: var(--textMuted); margin-bottom: 20px; }

    .modal-detail-rows {
      background: rgba(255,255,255,0.04); border-radius: 12px;
      padding: 12px 16px; margin-bottom: 20px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .modal-detail-row {
      display: flex; align-items: center; gap: 12px; font-size: 14px;
    }
    .modal-detail-row__icon { font-size: 16px; flex-shrink: 0; }
    .modal-detail-row__label {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      color: var(--textMuted); letter-spacing: .05em;
      min-width: 60px;
    }
    .modal-detail-row__val  { font-size: 14px; font-weight: 500; color: var(--text); }

    .modal-actions { display: flex; gap: 8px; flex-direction: column; }
    .modal-actions--row { flex-direction: row; }

    /* Modal estado confirmado */
    .modal-success {
      display: flex; flex-direction: column; align-items: center;
      text-align: center; gap: 14px; padding: 8px 0;
    }
    .modal-success__circle {
      width: 72px; height: 72px; border-radius: 50%;
      background: var(--availBg); border: 2px solid var(--availBorder);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
    }
    .modal-success__title { font-size: 22px; font-weight: 800; color: var(--text); }
    .modal-success__sub   { font-size: 14px; color: var(--textMuted); margin-bottom: 8px; }

    /* ── TOAST ──────────────────────────────────────────────────── */
    .toast-wrap {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 999; display: flex; flex-direction: column; align-items: center;
      gap: 8px; pointer-events: none;
    }
    .toast {
      background: var(--surface); border: 1px solid var(--cardBorder);
      border-radius: 10px; padding: 10px 22px;
      font-size: 13px; font-weight: 500; max-width: 320px; text-align: center;
      pointer-events: all; animation: fadeUp .18s ease;
    }
    .toast--success { border-color: var(--availBorder); color: var(--available); }
    .toast--error   { border-color: rgba(255,80,80,.3); color: rgba(255,110,110,.9); }
    .toast--info    { border-color: rgba(74,158,255,.3); color: var(--accent); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* ── SPINNER ────────────────────────────────────────────────── */
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,.1); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .65s linear infinite;
      margin: 32px auto; display: block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LOADING INICIAL ────────────────────────────────────────── */
    #loadingFull {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px; z-index: 9999;
    }

<!-- ══════════════════════════════════════════════════════════════
     JAVASCRIPT
══════════════════════════════════════════════════════════════ -->
<script>
'use strict';

/* ── SUPABASE ──────────────────────────────────────────────────── */
const SB_URL = 'https://ljsrakvyayjguwesmzoi.supabase.co';
const SB_KEY = 'sb_publishable_fJb0jH0ENWv8ux7MBr3EdA_k1Mlt9p-';

async function sbq(path, opts = {}) {
  const prefer = opts.method === 'POST' ? 'return=representation' : 'return=minimal';
  const r = await fetch(`${SB_URL}/rest/v1${path}`, {
    headers: {
      'apikey':        SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type':  'application/json',
      'Prefer':        prefer,
    },
    ...opts,
  });
  if (!r.ok) {
    const txt = await r.text();
    throw new Error(`SB ${r.status}: ${txt}`);
  }
  const txt = await r.text();
  return txt ? JSON.parse(txt) : null;
}

/* ── ESTADO GLOBAL ─────────────────────────────────────────────── */
const S = {
  cliente:      null,
  config:       {},
  canchas:      [],
  fechaActual:  fechaHoy(),
  canchaActual: null,
  dniPendiente: '',
};

/* ── HELPERS ───────────────────────────────────────────────────── */
function fechaHoy() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2, '0'); }
function uid(p) { return p + '_' + Math.random().toString(36).slice(2,9) + Date.now().toString(36); }
function dniAId(dni) { return `cld${dni}`; }
function minutos(h) { const [hh,mm] = h.split(':').map(Number); return hh*60+mm; }
function sumar(h, min) { const t = minutos(h)+min; return `${pad(Math.floor(t/60))}:${pad(t%60)}`; }

const DIAS_CORTO = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const DIAS_LARGO = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES      = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MESES_FULL = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function infoFecha(str) {
  const [y,m,d] = str.split('-').map(Number);
  const o = new Date(y,m-1,d);
  return { dia: DIAS_CORTO[o.getDay()], num: d, mes: MESES[m-1] };
}
function fechaLarga(str) {
  const [y,m,d] = str.split('-').map(Number);
  const o = new Date(y,m-1,d);
  return `${DIAS_LARGO[o.getDay()]} ${d} de ${MESES_FULL[m-1]}`;
}
function fechaCorta(str) {
  const [y,m,d] = str.split('-').map(Number);
  const o = new Date(y,m-1,d);
  return `${DIAS_CORTO[o.getDay()]} ${d} ${MESES[m-1]}`;
}
function proxFechas(n=7) {
  const arr = [];
  for (let i=0; i<n; i++) {
    const d = new Date(); d.setDate(d.getDate()+i);
    arr.push(`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`);
  }
  return arr;
}

function deporteInfo(deporte='') {
  const d = deporte.toLowerCase();
  if (d.includes('fútbol')||d.includes('futbol')||d.includes('futsal'))
    return { emoji:'⚽', color:'#f59e0b', bg:'rgba(245,158,11,0.15)' };
  if (d.includes('pádel')||d.includes('padel'))
    return { emoji:'🏓', color:'#38bdf8', bg:'rgba(56,189,248,0.15)' };
  if (d.includes('tenis'))
    return { emoji:'🎾', color:'#38bdf8', bg:'rgba(56,189,248,0.15)' };
  if (d.includes('básquet')||d.includes('basquet'))
    return { emoji:'🏀', color:'#f97316', bg:'rgba(249,115,22,0.15)' };
  return { emoji:'🏟️', color:'#4a9eff', bg:'rgba(74,158,255,0.15)' };
}

/* ── TOAST ─────────────────────────────────────────────────────── */
function toast(msg, tipo='info', ms=3200) {
  const el = document.createElement('div');
  el.className = `toast toast--${tipo}`;
  el.textContent = msg;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(() => el.remove(), ms);
}

/* ── MODAL ─────────────────────────────────────────────────────── */
function abrirModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('active');
}
function cerrarModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target.id === 'modalOverlay') cerrarModal();
});

/* ── PANTALLAS ─────────────────────────────────────────────────── */
function ir(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

/* ── VALIDACIONES ──────────────────────────────────────────────── */
function validarDNI(v) {
  const n = v.replace(/\D/g,'');
  if (!n.length) return 'Ingresá tu DNI.';
  if (n.length<7||n.length>8) return 'El DNI debe tener 7 u 8 dígitos.';
  return null;
}
function validarNombre(v) {
  const s = v.trim();
  if (s.length<5) return 'El nombre debe tener al menos 5 caracteres.';
  if (!/^[a-záéíóúüñA-ZÁÉÍÓÚÜÑ\s'.-]+$/.test(s)) return 'Solo se permiten letras.';
  return null;
}
function validarTelefono(v) {
  const n = v.replace(/\D/g,'');
  if (n.length<8||n.length>13) return 'Ingresá un número válido (8 a 13 dígitos).';
  return null;
}
function marcarError(inputId, errId, msg) {
  const inp = document.getElementById(inputId);
  const err = document.getElementById(errId);
  if (msg) { inp.classList.add('is-error'); err.textContent=msg; return false; }
  inp.classList.remove('is-error'); err.textContent=''; return true;
}

/* ══════════════════════════════════════════════════════════════
   PANTALLA 1 — DNI
══════════════════════════════════════════════════════════════ */
document.getElementById('inDNI').addEventListener('input', e => {
  e.target.value = e.target.value.replace(/\D/g,'');
});
document.getElementById('inDNI').addEventListener('keydown', e => {
  if (e.key==='Enter') document.getElementById('btnContinuar').click();
});

document.getElementById('btnContinuar').addEventListener('click', async () => {
  const dni = document.getElementById('inDNI').value.trim();
  if (!marcarError('inDNI','errDNI',validarDNI(dni))) return;
  const btn = document.getElementById('btnContinuar');
  btn.disabled=true; btn.textContent='Verificando…';
  try {
    const rows = await sbq(`/clientes?id=eq.${dniAId(dni)}`);
    if (rows?.length) {
      const c = rows[0];
      S.cliente = { id:c.id, nombre:c.nombre, telefono:c.telefono, dni };
      guardarSesion(); await entrar();
    } else {
      S.dniPendiente = dni;
      document.getElementById('regDNI').value = dni;
      ir('screen-registro');
      setTimeout(() => document.getElementById('regNombre').focus(), 80);
    }
  } catch { toast('Error de conexión. Intentá de nuevo.','error'); }
  finally { btn.disabled=false; btn.textContent='Continuar →'; }
});

/* ══════════════════════════════════════════════════════════════
   PANTALLA 2 — REGISTRO
══════════════════════════════════════════════════════════════ */
document.getElementById('btnVolver').addEventListener('click', () => ir('screen-dni'));
document.getElementById('regTel').addEventListener('input', e => {
  e.target.value = e.target.value.replace(/\D/g,'');
});

document.getElementById('btnRegistrar').addEventListener('click', async () => {
  const nombre = document.getElementById('regNombre').value;
  const tel    = document.getElementById('regTel').value;
  const okN = marcarError('regNombre','errNombre',validarNombre(nombre));
  const okT = marcarError('regTel','errTel',validarTelefono(tel));
  if (!okN||!okT) return;
  const btn = document.getElementById('btnRegistrar');
  btn.disabled=true; btn.textContent='Registrando…';
  try {
    const nuevo = { id:dniAId(S.dniPendiente), nombre:nombre.trim(), telefono:tel.trim(), fechaRegistro:new Date().toISOString() };
    await sbq('/clientes', { method:'POST', body:JSON.stringify(nuevo) });
    S.cliente = { ...nuevo, dni:S.dniPendiente };
    guardarSesion(); await entrar();
  } catch(e) { toast('Error al registrar. Intentá de nuevo.','error'); console.error(e); }
  finally { btn.disabled=false; btn.textContent='Crear cuenta →'; }
});

/* ── SESIÓN ─────────────────────────────────────────────────────── */
function guardarSesion() { localStorage.setItem('rv_cliente', JSON.stringify(S.cliente)); }
function borrarSesion()  { localStorage.removeItem('rv_cliente'); }

/* ══════════════════════════════════════════════════════════════
   ENTRAR AL SISTEMA
══════════════════════════════════════════════════════════════ */
async function entrar() {
  ir('screen-main');
  const nombre = S.config.nombre || 'Reservas';
  const emoji  = S.config.emoji  || '⚽';
  const first  = S.cliente.nombre.split(' ')[0];
  document.getElementById('hComplex').textContent = nombre;
  document.getElementById('hLogo').textContent    = emoji;
  document.getElementById('hUser').innerHTML =
    `Hola, <span>${first}</span> 👋`;

  S.canchas = await sbq('/canchas?activa=eq.true&order=nombre') || [];
  if (S.canchas.length) S.canchaActual = S.canchas[0].id;

  renderDateTabs();
  renderCanchaTabs();
  renderInfoBar();
  await Promise.all([renderSlots(), renderMisReservas()]);
}

/* ── ACCORDION ──────────────────────────────────────────────────── */
document.getElementById('accordionTrigger').addEventListener('click', () => {
  const trigger = document.getElementById('accordionTrigger');
  const body    = document.getElementById('accordionBody');
  const isOpen  = trigger.classList.contains('open');
  trigger.classList.toggle('open', !isOpen);
  body.classList.toggle('open',   !isOpen);
  body.classList.toggle('closed',  isOpen);
});

/* ── DATE TABS ──────────────────────────────────────────────────── */
function renderDateTabs() {
  const wrap = document.getElementById('dateTabs');
  wrap.innerHTML = '';
  proxFechas(7).forEach((f,i) => {
    const { dia,num,mes } = infoFecha(f);
    const tab = document.createElement('div');
    tab.className = 'date-tab' + (f===S.fechaActual?' active':'');
    tab.innerHTML = `
      <span class="date-tab__day">${i===0?'Hoy':dia}</span>
      <span class="date-tab__num">${num}</span>
      <span class="date-tab__mes">${mes}</span>
      <span class="date-tab__dot"></span>`;
    tab.addEventListener('click', async () => {
      S.fechaActual = f;
      document.querySelectorAll('.date-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      renderInfoBar();
      await renderSlots();
    });
    wrap.appendChild(tab);
  });
}

/* ── CANCHA TABS ────────────────────────────────────────────────── */
function renderCanchaTabs() {
  const wrap = document.getElementById('canchaTabs');
  wrap.innerHTML = '';
  S.canchas.forEach(c => {
    const tab = document.createElement('div');
    tab.className = 'cancha-tab' + (c.id===S.canchaActual?' active':'');
    tab.textContent = c.nombre;
    tab.addEventListener('click', async () => {
      S.canchaActual = c.id;
      document.querySelectorAll('.cancha-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      renderInfoBar();
      await renderSlots();
    });
    wrap.appendChild(tab);
  });
}

/* ── INFO BAR ───────────────────────────────────────────────────── */
function renderInfoBar() {
  const cancha = S.canchas.find(c => c.id === S.canchaActual);
  const bar    = document.getElementById('infoBar');
  if (!cancha) { bar.style.display='none'; return; }
  bar.style.display = '';
  const info  = deporteInfo(cancha.deporte);
  const esHoy = S.fechaActual === fechaHoy();
  bar.innerHTML = `
    <div class="info-bar__dot" style="background:${info.color}"></div>
    <span>${cancha.nombre}</span>
    <span class="info-bar__sep">·</span>
    <span>${cancha.deporte}</span>
    <span class="info-bar__sep">·</span>
    <span>${esHoy ? 'Hoy' : fechaCorta(S.fechaActual)}</span>`;
}

/* ── SLOT GRID ──────────────────────────────────────────────────── */
async function renderSlots() {
  const grid = document.getElementById('slotGrid');
  grid.innerHTML = '<div class="spinner" style="grid-column:1/-1"></div>';

  const cancha = S.canchas.find(c => c.id === S.canchaActual);
  if (!cancha) { grid.innerHTML=''; return; }

  const turnosDB = await sbq(
    `/turnos?canchaId=eq.${cancha.id}&fecha=eq.${S.fechaActual}&order=horaInicio`
  ) || [];

  const misReservasDB = S.cliente
    ? await sbq(`/reservas?clienteId=eq.${S.cliente.id}`) || [] : [];
  const misTurnoIds = new Set(misReservasDB.map(r=>r.turnoId));

  const slotsCalc = calcularSlots(cancha);
  const esHoy     = S.fechaActual === fechaHoy();
  const ahoraMin  = minutos(`${pad(new Date().getHours())}:${pad(new Date().getMinutes())}`);

  grid.innerHTML = '';

  if (!slotsCalc.length) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:32px;color:var(--textSub);font-size:13px">No hay turnos configurados para este día.</div>';
    return;
  }

  slotsCalc.forEach(slot => {
    const turnoExistente = turnosDB.find(t => t.horaInicio===slot.horaInicio);
    const esMio   = turnoExistente && turnoExistente.estado!=='disponible' && misTurnoIds.has(turnoExistente.id);
    const ocupado = turnoExistente && turnoExistente.estado!=='disponible' && !esMio;
    const pasado  = esHoy && minutos(slot.horaInicio) <= ahoraMin;
    const libre   = !ocupado && !pasado && !esMio;

    let cls = 'slot ';
    if      (pasado)  cls += 'slot--pasado';
    else if (esMio)   cls += 'slot--mia';
    else if (ocupado) cls += 'slot--ocupado';
    else              cls += 'slot--libre';

    const div = document.createElement('div');
    div.className = cls;
    div.innerHTML = `
      <div class="slot__time">${slot.horaInicio}</div>
      <div class="slot__dur">${cancha.duracionTurno} min</div>
      <div class="slot__price">
        ${esMio   ? '✓ Mi reserva' :
          ocupado ? 'Ocupado'      :
          pasado  ? ''             :
          `$${cancha.precio.toLocaleString('es-AR')}`}
      </div>`;
    if (libre) div.addEventListener('click', () => pedirConfirmacion(slot, turnoExistente, cancha));
    grid.appendChild(div);
  });
}

function calcularSlots(cancha) {
  const apertura = S.config.horaApertura || '08:00';
  const cierre   = S.config.horaCierre   || '22:00';
  const slots = []; let h = apertura;
  while (minutos(h) + cancha.duracionTurno <= minutos(cierre)) {
    slots.push({ horaInicio:h, horaFin:sumar(h,cancha.duracionTurno) });
    h = sumar(h, cancha.duracionTurno);
  }
  return slots;
}

/* ── CONFIRMAR RESERVA ──────────────────────────────────────────── */
function pedirConfirmacion(slot, turnoExistente, cancha) {
  const info = deporteInfo(cancha.deporte);
  abrirModal(`
    <div class="modal__label">Confirmar reserva</div>
    <div class="modal__title">${cancha.nombre}</div>
    <div class="modal__sub">${cancha.deporte} · ${cancha.duracionTurno} min</div>
    <div class="modal-detail-rows">
      <div class="modal-detail-row">
        <span class="modal-detail-row__icon">📅</span>
        <span class="modal-detail-row__label">Fecha</span>
        <span class="modal-detail-row__val">${fechaLarga(S.fechaActual)}</span>
      </div>
      <div class="modal-detail-row">
        <span class="modal-detail-row__icon">🕐</span>
        <span class="modal-detail-row__label">Horario</span>
        <span class="modal-detail-row__val">${slot.horaInicio} – ${slot.horaFin}</span>
      </div>
      <div class="modal-detail-row">
        <span class="modal-detail-row__icon">💰</span>
        <span class="modal-detail-row__label">Precio</span>
        <span class="modal-detail-row__val" style="color:var(--available)">$${cancha.precio.toLocaleString('es-AR')}</span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn--success btn--full" id="btnConfirmarReserva">Confirmar reserva</button>
      <button class="btn btn--ghost btn--full" onclick="cerrarModal()">Cancelar</button>
    </div>
  `);
  document.getElementById('btnConfirmarReserva').onclick =
    () => hacerReserva(slot, turnoExistente, cancha);
}

async function hacerReserva(slot, turnoExistente, cancha) {
  // Estado loading
  const btnConfirmar = document.getElementById('btnConfirmarReserva');
  if (btnConfirmar) { btnConfirmar.disabled=true; btnConfirmar.textContent='Procesando…'; }

  try {
    let turnoId;
    if (turnoExistente) {
      const [actual] = await sbq(`/turnos?id=eq.${turnoExistente.id}`) || [];
      if (!actual || actual.estado!=='disponible') {
        cerrarModal();
        toast('Este turno ya no está disponible 😕','error');
        await renderSlots(); return;
      }
      await sbq(`/turnos?id=eq.${turnoExistente.id}`, {
        method:'PATCH', body:JSON.stringify({ estado:'reservado' }),
      });
      turnoId = turnoExistente.id;
    } else {
      const nuevoTurno = { id:uid('t'), canchaId:cancha.id, fecha:S.fechaActual, horaInicio:slot.horaInicio, horaFin:slot.horaFin, estado:'reservado' };
      const existentes = await sbq(`/turnos?canchaId=eq.${cancha.id}&fecha=eq.${S.fechaActual}&horaInicio=eq.${slot.horaInicio}`) || [];
      if (existentes.length) {
        const ex = existentes[0];
        if (ex.estado!=='disponible') { cerrarModal(); toast('Este turno ya no está disponible 😕','error'); await renderSlots(); return; }
        await sbq(`/turnos?id=eq.${ex.id}`, { method:'PATCH', body:JSON.stringify({ estado:'reservado' }) });
        turnoId = ex.id;
      } else {
        const created = await sbq('/turnos', { method:'POST', body:JSON.stringify(nuevoTurno) });
        turnoId = (Array.isArray(created)?created[0]:created)?.id || nuevoTurno.id;
      }
    }
    await sbq('/reservas', { method:'POST', body:JSON.stringify({ id:uid('r'), clienteId:S.cliente.id, turnoId }) });

    // Estado confirmado
    abrirModal(`
      <div class="modal-success">
        <div class="modal-success__circle">✓</div>
        <div class="modal-success__title">¡Reserva confirmada!</div>
        <div class="modal-success__sub">${cancha.nombre} · ${slot.horaInicio} – ${slot.horaFin}<br>${fechaLarga(S.fechaActual)}</div>
        <button class="btn btn--confirm-back btn--full" onclick="cerrarModal()">Volver</button>
      </div>
    `);
    await Promise.all([renderSlots(), renderMisReservas()]);
  } catch(e) {
    cerrarModal();
    toast('Error al reservar. Intentá de nuevo.','error');
    console.error(e);
  }
}

/* ── MIS RESERVAS ───────────────────────────────────────────────── */
async function renderMisReservas() {
  const wrap = document.getElementById('misReservas');
  wrap.innerHTML = '<div class="spinner"></div>';

  try {
    const hoyStr  = fechaHoy();
    const reservas = await sbq(`/reservas?clienteId=eq.${S.cliente.id}`) || [];

    if (!reservas.length) {
      wrap.innerHTML = '<div class="empty-reservas">No tenés reservas activas.</div>';
      actualizarBadge(0); return;
    }

    const ids    = reservas.map(r=>r.turnoId).join(',');
    const turnos = await sbq(`/turnos?id=in.(${ids})&fecha=gte.${hoyStr}&estado=in.(reservado,pendiente,pagado)&order=fecha,horaInicio`) || [];

    if (!turnos.length) {
      wrap.innerHTML = '<div class="empty-reservas">No tenés reservas activas.</div>';
      actualizarBadge(0); return;
    }

    const canchaIds = [...new Set(turnos.map(t=>t.canchaId))].join(',');
    const canchas   = await sbq(`/canchas?id=in.(${canchaIds})`) || [];

    wrap.innerHTML = '';
    turnos.forEach(turno => {
      const cancha  = canchas.find(c=>c.id===turno.canchaId);
      const reserva = reservas.find(r=>r.turnoId===turno.id);
      if (!cancha||!reserva) return;

      const esHoyTurno = turno.fecha === hoyStr;
      const info       = deporteInfo(cancha.deporte);
      const estadoBadge = turno.estado==='pendiente'
        ? '<span class="reserva-card__badge badge--pendiente">Pendiente</span>'
        : '<span class="reserva-card__badge badge--confirmada">Confirmada</span>';

      const card = document.createElement('div');
      card.className = 'reserva-card';
      card.innerHTML = `
        <div class="reserva-card__icon" style="background:${info.bg}">${info.emoji}</div>
        <div class="reserva-card__main">
          <div class="reserva-card__court">${cancha.nombre}</div>
          <div class="reserva-card__time">
            ${esHoyTurno?'<strong style="color:var(--pending)">Hoy</strong>':fechaCorta(turno.fecha)}
            · ${turno.horaInicio} – ${turno.horaFin}
          </div>
        </div>
        <div class="reserva-card__right">
          <div class="reserva-card__price">$${cancha.precio.toLocaleString('es-AR')}</div>
          ${estadoBadge}
        </div>
        <button class="btn--danger-soft"
          data-rid="${reserva.id}" data-tid="${turno.id}"
          data-cancha="${cancha.nombre}" data-fecha="${turno.fecha}"
          data-inicio="${turno.horaInicio}" data-fin="${turno.horaFin}">
          Cancelar
        </button>`;
      wrap.appendChild(card);
    });

    if (!wrap.children.length) {
      wrap.innerHTML = '<div class="empty-reservas">No tenés reservas activas.</div>';
      actualizarBadge(0);
    } else {
      actualizarBadge(wrap.children.length);
      wrap.querySelectorAll('[data-rid]').forEach(btn => {
        btn.addEventListener('click', () => pedirCancelacion(
          btn.dataset.rid, btn.dataset.tid, btn.dataset.cancha,
          btn.dataset.fecha, btn.dataset.inicio, btn.dataset.fin
        ));
      });
    }
  } catch(e) {
    wrap.innerHTML = '<div class="empty-reservas">Error al cargar reservas.</div>';
    console.error(e);
  }
}

function actualizarBadge(n) {
  document.getElementById('accordionBadge').textContent = n;
}

/* ── CANCELAR ───────────────────────────────────────────────────── */
function pedirCancelacion(rid, tid, cancha, fecha, inicio, fin) {
  abrirModal(`
    <div class="modal__label">Cancelar reserva</div>
    <div class="modal__title">¿Estás seguro?</div>
    <div class="modal__sub">Esta acción no se puede deshacer.</div>
    <div class="modal-detail-rows">
      <div class="modal-detail-row">
        <span class="modal-detail-row__icon">🏟️</span>
        <span class="modal-detail-row__label">Cancha</span>
        <span class="modal-detail-row__val">${cancha}</span>
      </div>
      <div class="modal-detail-row">
        <span class="modal-detail-row__icon">📅</span>
        <span class="modal-detail-row__label">Fecha</span>
        <span class="modal-detail-row__val">${fechaLarga(fecha)}</span>
      </div>
      <div class="modal-detail-row">
        <span class="modal-detail-row__icon">🕐</span>
        <span class="modal-detail-row__label">Horario</span>
        <span class="modal-detail-row__val">${inicio} – ${fin}</span>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn--danger-soft btn--full" id="btnEjecutarCancel" style="padding:12px;font-size:14px;border-radius:10px">
        Cancelar turno
      </button>
      <button class="btn btn--ghost btn--full" onclick="cerrarModal()">Volver</button>
    </div>
  `);
  document.getElementById('btnEjecutarCancel').onclick =
    () => ejecutarCancelacion(rid, tid);
}

async function ejecutarCancelacion(rid, tid) {
  cerrarModal();
  try {
    await sbq(`/turnos?id=eq.${tid}`, { method:'PATCH', body:JSON.stringify({ estado:'disponible' }) });
    await sbq(`/reservas?id=eq.${rid}`, { method:'DELETE' });
    toast('Reserva cancelada.','info');
    await Promise.all([renderSlots(), renderMisReservas()]);
  } catch(e) {
    toast('Error al cancelar. Intentá de nuevo.','error');
    console.error(e);
  }
}

/* ── SALIR ──────────────────────────────────────────────────────── */
document.getElementById('btnSalir').addEventListener('click', () => {
  abrirModal(`
    <div class="modal__label">Sesión</div>
    <div class="modal__title">Cerrar sesión</div>
    <div class="modal__sub">La próxima vez vas a tener que ingresar tu DNI.</div>
    <div class="modal-actions">
      <button class="btn btn--danger-soft btn--full" id="btnConfirmarSalir" style="padding:12px;font-size:14px;border-radius:10px">
        Salir
      </button>
      <button class="btn btn--ghost btn--full" onclick="cerrarModal()">Quedarme</button>
    </div>
  `);
  document.getElementById('btnConfirmarSalir').onclick = () => {
    borrarSesion(); S.cliente=null;
    cerrarModal(); ir('screen-dni');
    document.getElementById('inDNI').value='';
  };
});

/* ══════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════ */
async function init() {
  try {
    const rows = await sbq('/config');
    const cfg  = rows?.[0] || {};
    S.config = {
      nombre:       cfg.nombreComplejo || cfg.nombre || 'Reservas',
      horaApertura: cfg.horaApertura   || '08:00',
      horaCierre:   cfg.horaCierre     || '22:00',
    };
    const local = JSON.parse(localStorage.getItem('reservas_local_cfg') || '{}');
    if (local.emoji) S.config.emoji = local.emoji;
  } catch(e) { console.warn('Config no disponible.', e); }

  const emoji  = S.config.emoji  || '⚽';
  const nombre = S.config.nombre || 'Reservas';
  ['logoA','logoB'].forEach(id => { document.getElementById(id).textContent = emoji; });
  ['nameA','nameB'].forEach(id => { document.getElementById(id).textContent = nombre; });
  document.getElementById('loadIcon').textContent = emoji;
  document.title = `Reservar · ${nombre}`;

  const saved = localStorage.getItem('rv_cliente');
  if (saved) {
    try {
      const c = JSON.parse(saved);
      const rows = await sbq(`/clientes?id=eq.${c.id}`);
      if (rows?.length) {
        S.cliente = { ...c, nombre:rows[0].nombre, telefono:rows[0].telefono };
        guardarSesion();
        document.getElementById('loadingFull').classList.add('oculto');
        await entrar(); return;
      }
    } catch { /* sesión inválida */ }
    borrarSesion();
  }

  document.getElementById('loadingFull').classList.add('oculto');
  ir('screen-dni');
  setTimeout(() => document.getElementById('inDNI').focus(), 100);
}

init();

/* ── REFRESCO AUTOMÁTICO ────────────────────────────────────────── */
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState==='visible' && S.cliente)
    Promise.all([renderSlots(), renderMisReservas()]);
});
setInterval(() => {
  if (!document.hidden && S.cliente)
    Promise.all([renderSlots(), renderMisReservas()]);
}, 30_000);
</script>
